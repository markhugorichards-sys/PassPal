<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080c14">
<title>PassPal AI — Compare Driving Instructors. Find the Best Value.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Satoshi:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────────────── */
:root{
  --bg:#080c14;--bg1:#0d1220;--bg2:#111827;--bg3:#1a2236;
  --glass:rgba(255,255,255,.04);--glassb:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.07);--borderh:rgba(255,255,255,.14);
  --blue:#4f8fff;--blued:#3a6fe0;--bluegl:rgba(79,143,255,.15);--bluell:rgba(79,143,255,.08);
  --green:#00e676;--greend:#00c864;--greengl:rgba(0,230,118,.12);
  --amber:#ffb300;--ambergl:rgba(255,179,0,.12);
  --red:#ff4d6a;--redgl:rgba(255,77,106,.12);
  --text:#f0f4ff;--text2:#8a9bc4;--text3:#4a5880;--text4:#2a3550;
  --r:10px;--rlg:16px;--rxl:22px;--r2xl:28px;
  /* fluid type */
  --txs:clamp(10px,2.5vw,11px);--tsm:clamp(12px,3vw,13px);
  --tbase:clamp(14px,3.5vw,15px);--tmd:clamp(15px,4vw,16px);
  --tlg:clamp(17px,4.5vw,19px);--txl:clamp(20px,5vw,24px);
  --t2xl:clamp(26px,6vw,36px);--t3xl:clamp(32px,8vw,52px);
  --thero:clamp(36px,10vw,76px);
  /* spacing */
  --sp1:4px;--sp2:8px;--sp3:12px;--sp4:16px;--sp5:20px;--sp6:24px;--sp8:32px;--sp10:40px;
  /* safe areas */
  --sab:env(safe-area-inset-bottom,0px);
  --sat:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Satoshi',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  font-size:var(--tbase);line-height:1.6;
  overflow-x:hidden;
  padding-bottom:calc(56px + var(--sab));
}
body.no-bottom-pad{padding-bottom:var(--sab)}
img{display:block;max-width:100%}
button,input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* ─── ANIMATIONS ─────────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:none}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

.afu{animation:fadeUp .35s cubic-bezier(.22,.68,0,1.2) both}
.afi{animation:fadeIn .25s ease both}
.asu{animation:slideUp .32s cubic-bezier(.22,.68,0,1.1) both}
.d1{animation-delay:.07s}.d2{animation-delay:.14s}.d3{animation-delay:.21s}.d4{animation-delay:.28s}

/* ─── SKELETON ───────────────────────────────────────────────────── */
.skeleton{
  background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:var(--r);
}

/* ─── LAYOUT ─────────────────────────────────────────────────────── */
.wrap{max-width:1160px;margin:0 auto;padding:0 var(--sp6)}
.wrap-sm{max-width:700px;margin:0 auto;padding:0 var(--sp6)}
.wrap-xs{max-width:480px;margin:0 auto;padding:0 var(--sp4)}

/* ─── CARDS ──────────────────────────────────────────────────────── */
.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--rlg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.card-s{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rlg)}
/* hover only on pointer devices */
@media(hover:hover){
  .card-h{transition:all .22s cubic-bezier(.4,0,.2,1);cursor:pointer}
  .card-h:hover{border-color:var(--borderh);background:var(--glassb);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
}

/* ─── BUTTONS ────────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  min-height:48px;padding:0 22px;border-radius:var(--r);
  font-family:inherit;font-size:var(--tsm);font-weight:700;
  border:none;cursor:pointer;transition:all .18s;
  white-space:nowrap;text-decoration:none;letter-spacing:.01em;
  -webkit-appearance:none;touch-action:manipulation;
}
.btn:active{transform:scale(.96)}
.btn-sm{min-height:38px;padding:0 14px;font-size:var(--txs);border-radius:8px}
.btn-lg{min-height:54px;padding:0 32px;font-size:var(--tmd);border-radius:var(--rlg)}
.btn-full{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-p{background:var(--blue);color:#fff;box-shadow:0 0 24px rgba(79,143,255,.3)}
@media(hover:hover){.btn-p:hover{background:var(--blued);box-shadow:0 0 36px rgba(79,143,255,.5);transform:translateY(-1px)}}
.btn-g{background:var(--green);color:#001a0e;box-shadow:0 0 18px rgba(0,230,118,.25)}
@media(hover:hover){.btn-g:hover{background:var(--greend);box-shadow:0 0 28px rgba(0,230,118,.4);transform:translateY(-1px)}}
.btn-ghost{background:var(--glass);color:var(--text2);border:1px solid var(--border)}
@media(hover:hover){.btn-ghost:hover{border-color:var(--borderh);color:var(--text);background:var(--glassb)}}
.btn-sub{background:var(--bluell);color:var(--blue)}
@media(hover:hover){.btn-sub:hover{background:var(--bluegl)}}

/* ─── INPUTS ─────────────────────────────────────────────────────── */
.field{display:flex;flex-direction:column;gap:6px}
.label{font-size:var(--txs);font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase}
.input,.select{
  min-height:48px;padding:0 14px;border:1.5px solid var(--border);
  border-radius:var(--r);background:var(--bg2);color:var(--text);
  font-family:inherit;font-size:var(--tbase);outline:none;
  transition:border-color .15s,box-shadow .15s;width:100%;
  -webkit-appearance:none;appearance:none;
}
.input:focus,.select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,143,255,.18)}
.input::placeholder{color:var(--text3)}
textarea.input{min-height:90px;padding:12px 14px;resize:vertical}
.select option{background:var(--bg2)}
/* hero inputs */
.hinput{
  min-height:48px;padding:0 14px;border:1.5px solid rgba(255,255,255,.12);
  border-radius:var(--r);background:rgba(255,255,255,.06);color:var(--text);
  font-family:inherit;font-size:var(--tbase);font-weight:500;outline:none;
  transition:all .15s;width:100%;-webkit-appearance:none;
}
.hinput::placeholder{color:var(--text3)}
.hinput:focus{border-color:var(--blue);background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(79,143,255,.15)}
.hinput option{background:var(--bg2)}

/* ─── CHIPS ──────────────────────────────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:var(--txs);font-weight:700}
.ch-blue{background:var(--bluegl);color:var(--blue);border:1px solid rgba(79,143,255,.2)}
.ch-green{background:var(--greengl);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.ch-amber{background:var(--ambergl);color:var(--amber);border:1px solid rgba(255,179,0,.2)}
.ch-red{background:var(--redgl);color:var(--red);border:1px solid rgba(255,77,106,.2)}
.ch-gray{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border)}
.ch-navy{background:var(--bg2);color:var(--text3);border:1px solid var(--border)}

/* ─── TOGGLE ─────────────────────────────────────────────────────── */
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--bg3);border-radius:99px;transition:all .2s;cursor:pointer;border:1px solid var(--border)}
.tog-track::before{content:'';position:absolute;width:18px;height:18px;left:2px;bottom:2px;background:var(--text2);border-radius:50%;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked~.tog-track{background:var(--blue);border-color:var(--blue);box-shadow:0 0 12px rgba(79,143,255,.3)}
.tog input:checked~.tog-track::before{transform:translateX(20px);background:#fff}

/* ─── PROGRESS ───────────────────────────────────────────────────── */
.prog{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--blue);transition:width .4s ease}

/* ─── RANGE ──────────────────────────────────────────────────────── */
input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:var(--bg3);border-radius:99px;cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--blue);border:3px solid var(--bg1);cursor:grab;box-shadow:0 0 10px rgba(79,143,255,.4)}

/* ─── HEADER ─────────────────────────────────────────────────────── */
#hdr{position:sticky;top:0;z-index:100;background:rgba(8,12,20,.92);backdrop-filter:blur(24px) saturate(1.5);border-bottom:1px solid var(--border)}
.hdr-inner{height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:0;cursor:pointer;text-decoration:none}
.logo-t{font-size:20px;font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,#fff 40%,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-b{font-size:var(--txs);font-weight:700;color:var(--green);letter-spacing:.05em;text-transform:uppercase;margin-left:8px;background:var(--greengl);padding:2px 8px;border-radius:4px;border:1px solid rgba(0,230,118,.2)}
.nav-d{display:flex;align-items:center;gap:2px}
.nav-btn{min-height:36px;padding:0 13px;border-radius:var(--r);font-size:var(--tsm);font-weight:600;color:var(--text2);background:none;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
@media(hover:hover){.nav-btn:hover{background:var(--glassb);color:var(--text)}}
.nav-btn.on{background:var(--bluegl);color:var(--blue)}
.nav-sep{width:1px;height:16px;background:var(--border);margin:0 6px}
@media(max-width:639px){.nav-d{display:none}}

/* ─── BOTTOM NAV (mobile learner) ────────────────────────────────── */
#bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  background:rgba(8,12,20,.96);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;padding:0 0 calc(var(--sab)) 0;
}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:56px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;transition:color .15s;font-family:inherit;padding-bottom:var(--sp1)}
.bnav-item svg{width:22px;height:22px}
.bnav-item.on{color:var(--blue)}
.bnav-item.on svg{filter:drop-shadow(0 0 6px rgba(79,143,255,.6))}
@media(min-width:640px){#bnav{display:none}}

/* ─── HERO ───────────────────────────────────────────────────────── */
.hero{padding:60px 0 52px;position:relative;overflow:hidden;background:var(--bg1)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(79,143,255,.16) 0%,transparent 60%),radial-gradient(ellipse 50% 70% at 85% 80%,rgba(0,230,118,.08) 0%,transparent 55%);pointer-events:none}
.eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--borderh);border-radius:99px;padding:5px 14px 5px 8px;margin-bottom:20px;background:var(--glass)}
.eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:glow 2s ease-in-out infinite;flex-shrink:0}
.eyebrow-t{font-size:var(--txs);color:var(--text2);font-weight:600}
.hero h1{font-size:var(--thero);font-weight:900;letter-spacing:-.03em;line-height:1.0;margin-bottom:16px}
.hero h1 .ac{color:var(--green)}
.hero h1 .dm{color:var(--text2)}
.hero-sub{font-size:var(--tlg);color:var(--text2);line-height:1.6;max-width:480px;margin-bottom:0;font-weight:400}
.hero-sub strong{color:var(--text);font-weight:700}

/* ─── MOBILE SEARCH HERO ─────────────────────────────────────────── */
.msearch{
  background:rgba(255,255,255,.04);border:1px solid var(--borderh);
  border-radius:var(--r2xl);padding:var(--sp6);margin-top:var(--sp6);
  box-shadow:0 24px 80px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
}
.msearch-row{display:flex;gap:var(--sp3);margin-bottom:var(--sp3)}
.msearch-row:last-child{margin-bottom:0}
/* desktop: 4-col grid */
@media(min-width:640px){
  .msearch-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:var(--sp4);align-items:flex-end}
  .msearch-row,.msearch-cta-row{display:none}
  .msearch-grid-cta{display:flex!important}
}
@media(max-width:639px){
  .msearch-grid{display:none}
  .msearch-grid-cta{display:none}
}
.msearch-label{font-size:var(--txs);font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.qe-btn{min-height:48px;padding:0 22px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-weight:800;font-size:var(--tsm);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:8px;box-shadow:0 0 24px rgba(79,143,255,.35);white-space:nowrap;touch-action:manipulation}
@media(hover:hover){.qe-btn:hover{background:var(--blued);transform:translateY(-1px);box-shadow:0 0 36px rgba(79,143,255,.5)}}
.qe-btn:active{transform:scale(.96)}
.trust-row{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.trust-item{font-size:var(--txs);color:var(--text3);display:flex;align-items:center;gap:5px}
.trust-item svg{color:var(--green);flex-shrink:0;width:14px;height:14px}

/* social proof avatars */
.sp-wrap{display:inline-flex;align-items:center;gap:7px;background:var(--glass);border:1px solid var(--border);border-radius:99px;padding:4px 12px 4px 4px;font-size:var(--txs);color:var(--text2);font-weight:600}
.sp-avs{display:flex}
.sp-avs img{width:22px;height:22px;border-radius:50%;border:2px solid var(--bg1);margin-left:-6px;object-fit:cover}
.sp-avs img:first-child{margin-left:0}

/* hero stats */
.hstats{display:flex;gap:var(--sp10);margin-top:var(--sp10);flex-wrap:wrap}
@media(max-width:639px){.hstats{gap:var(--sp6);margin-top:var(--sp8)}}
.hstat-n{font-size:clamp(26px,6vw,42px);font-weight:900;letter-spacing:-.03em;color:#fff;line-height:1}
.hstat-l{font-size:var(--txs);color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}

/* ─── COMPARE TOOLBAR ────────────────────────────────────────────── */
.ctool{background:rgba(8,12,20,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:80;padding:10px 0}
.ctool-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.rcount{font-size:var(--tsm);color:var(--text2)}
.rcount strong{color:var(--text)}
.save-pill{display:inline-flex;align-items:center;gap:5px;background:var(--greengl);color:var(--green);border:1px solid rgba(0,230,118,.2);padding:3px 10px;border-radius:99px;font-size:var(--txs);font-weight:700}
.pills{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{min-height:32px;padding:0 13px;border-radius:99px;font-size:var(--txs);font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--glass);color:var(--text2);transition:all .15s;font-family:inherit;white-space:nowrap;touch-action:manipulation}
.pill.on{background:var(--bg1);color:var(--text);border-color:var(--borderh)}
@media(hover:hover){.pill:hover{border-color:var(--borderh);color:var(--text)}}

/* ─── FILTER BOTTOM SHEET ────────────────────────────────────────── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;animation:fadeIn .2s ease}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:201;
  background:var(--bg2);border-top:1px solid var(--borderh);
  border-radius:22px 22px 0 0;
  max-height:82vh;overflow-y:auto;
  padding:0 var(--sp6) calc(var(--sp8) + var(--sab));
  animation:slideUp .28s cubic-bezier(.22,.68,0,1.1);
}
.sheet-handle{width:40px;height:4px;background:var(--bg3);border-radius:99px;margin:12px auto 20px}
.sheet-title{font-size:var(--tmd);font-weight:900;letter-spacing:-.01em;margin-bottom:20px}
.fblock{padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid var(--border)}
.fblock:last-child{border:none;padding:0;margin:0}
.ftitle{font-size:var(--txs);font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.filter-btn-mobile{position:fixed;bottom:calc(68px + var(--sab));right:16px;z-index:89;background:var(--blue);color:#fff;border:none;border-radius:99px;padding:0 18px;min-height:44px;font-family:inherit;font-weight:800;font-size:var(--tsm);display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(79,143,255,.4);cursor:pointer;touch-action:manipulation}
@media(min-width:640px){.filter-btn-mobile{display:none}}

/* ─── DESKTOP SIDEBAR ────────────────────────────────────────────── */
.sidebar{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rlg);padding:var(--sp5);position:sticky;top:112px;max-height:calc(100vh-132px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg3)}
@media(max-width:639px){.sidebar{display:none}}

/* ─── INSTRUCTOR CARDS ───────────────────────────────────────────── */
/* mobile: full-width stacked cards */
.inst-card-m{
  background:var(--bg1);border:1px solid var(--border);border-radius:var(--rlg);
  margin-bottom:10px;overflow:hidden;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
@media(hover:hover){.inst-card-m:hover{border-color:var(--borderh);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.4)}}
.inst-card-m.featured{border-color:rgba(79,143,255,.35);box-shadow:0 0 20px rgba(79,143,255,.07)}
.inst-card-m.best{border-color:rgba(0,230,118,.35);box-shadow:0 0 20px rgba(0,230,118,.07)}
.card-banner{padding:5px 16px;font-size:var(--txs);font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.cb-blue{background:linear-gradient(90deg,rgba(79,143,255,.2),transparent);color:var(--blue);border-bottom:1px solid rgba(79,143,255,.15)}
.cb-green{background:linear-gradient(90deg,rgba(0,230,118,.2),transparent);color:var(--green);border-bottom:1px solid rgba(0,230,118,.15)}

/* card header row */
.card-head{padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.card-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--borderh)}
.card-avatar-sk{width:52px;height:52px;border-radius:50%;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:var(--tmd);font-weight:800;letter-spacing:-.01em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:var(--txs);color:var(--text3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.vmark{color:var(--blue);font-size:var(--txs);font-weight:700;display:inline-flex;align-items:center;gap:3px}
.ex-badge{background:var(--ambergl);color:var(--amber);border:1px solid rgba(255,179,0,.2);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:800;letter-spacing:.05em}

/* card metrics row */

// ─── COMPARISON PAGE ──────────────────────────────────────────────────────
const ComparePage=({insts,sp,isGuest,onNav,onProfile,onBook,onWaitlist})=>{
  const [sort,setSort]=useState('passscore');
  const [verOnly,setVerOnly]=useState(false);
  const [maxRate,setMaxRate]=useState(60);
  const [tx,setTx]=useState(sp?.tx||'Any');
  const [gender,setGender]=useState('Any');
  const [ltype,setLtype]=useState(sp?.type||'Any');
  const [specs,setSpecs]=useState([]);
  const [evPref,setEvPref]=useState(false);
  const [expanded,setExpanded]=useState(null);
  const [sheetOpen,setSheetOpen]=useState(false);
  const [loading,setLoading]=useState(true);

  const exp=sp?.exp||'Complete Beginner';
  const pc=sp?.postcode||'Manchester';
  const hrs=HOURS[exp]||47;
  const ravg=RAVG(pc);

  useEffect(()=>{const t=setTimeout(()=>setLoading(false),700);return()=>clearTimeout(t);},[sp]);
  const toggleSpec=s=>setSpecs(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const resetFilters=()=>{setTx('Any');setGender('Any');setLtype('Any');setVerOnly(false);setMaxRate(60);setSpecs([]);setEvPref(false);};

  const results=useMemo(()=>{
    let r=insts.filter(i=>{
      return(tx==='Any'||i.tx.includes(tx))
        &&(gender==='Any'||i.gender===gender)
        &&(ltype==='Any'||i.types.includes(ltype))
        &&(!verOnly||i.verified)
        &&i.rate<=maxRate
        &&(specs.length===0||specs.every(s=>i.support.includes(s)))
        &&(!evPref||['Tesla','EV','Corsa-e','electric','hybrid'].some(k=>i.area.includes(k)||JSON.stringify(i).toLowerCase().includes(k.toLowerCase())));
    }).map(i=>{
      const total=i.rate*hrs;
      const ps=Math.max(0,Math.min(100,100-((i.rate-20)/50)*100));
      const rs=(i.rating/5)*100;
      const passScore=Math.round(ps*.4+rs*.3+i.passRate*.3);
      return{...i,total,passScore};
    });
    switch(sort){
      case 'rate':  return r.sort((a,b)=>a.rate-b.rate);
      case 'total': return r.sort((a,b)=>a.total-b.total);
      case 'pass':  return r.sort((a,b)=>b.passRate-a.passRate);
      case 'rating':return r.sort((a,b)=>b.rating-a.rating);
      default:      return r.sort((a,b)=>b.passScore-a.passScore);
    }
  },[insts,tx,gender,ltype,verOnly,maxRate,specs,sort,hrs,evPref]);

  const maxSave=results.length>1?results[results.length-1].total-results[0].total:0;
  const specOpts=['Anxious Drivers','ADHD Friendly','BSL / Deaf Support','Autism Friendly','Adapted Vehicle'];

  const FilterContent=()=><>
    <div className="fblock">
      <div className="ftitle">Max hourly rate</div>
      <input type="range" min={20} max={80} value={maxRate} onChange={e=>setMaxRate(+e.target.value)}/>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'var(--txs)',color:'var(--text3)',marginTop:8}}><span>£20</span><strong style={{color:'var(--blue)'}}>£{maxRate}/hr</strong></div>
    </div>
    {[{t:'Transmission',opts:['Any','Manual','Automatic'],v:tx,s:setTx},{t:'Lesson type',opts:['Any','Beginner','Standard','Intensive','Pass Plus','Refresher','Motorbike'],v:ltype,s:setLtype},{t:'Gender',opts:['Any','Male','Female'],v:gender,s:setGender}].map(({t,opts,v,s})=><div key={t} className="fblock">
      <div className="ftitle">{t}</div>
      <select className="select" value={v} onChange={e=>s(e.target.value)}>{opts.map(o=><option key={o}>{o}</option>)}</select>
    </div>)}
    <div className="fblock">
      <div className="ftitle">Specialist support</div>
      {specOpts.map(s=><label key={s} style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,cursor:'pointer',color:'var(--text2)',fontWeight:400,fontSize:'var(--tsm)'}}>
        <input type="checkbox" style={{width:16,height:16,accentColor:'var(--blue)'}} checked={specs.includes(s)} onChange={()=>toggleSpec(s)}/>{s}
      </label>)}
    </div>
    <div className="tog-row fblock">
      <span style={{fontWeight:700,fontSize:'var(--tsm)'}}>Verified only</span>
      <label className="tog"><input type="checkbox" checked={verOnly} onChange={e=>setVerOnly(e.target.checked)}/><span className="tog-track"/></label>
    </div>
    <div className="tog-row">
      <span style={{fontWeight:700,fontSize:'var(--tsm)'}}>EV / hybrid vehicle</span>
      <label className="tog"><input type="checkbox" checked={evPref} onChange={e=>setEvPref(e.target.checked)}/><span className="tog-track"/></label>
    </div>
  </>;

  return<>
    <div className="ctool">
      <div className="wrap ctool-inner">
        <div className="rcount"><strong>{results.length}</strong> instructors in {pc}{maxSave>0&&<> · <span className="save-pill">{I.zap} Save up to £{Math.round(maxSave)}</span></>}</div>
        <div className="pills">
          {[{v:'passscore',l:'PassScore'},{v:'rate',l:'Cheapest/hr'},{v:'total',l:'Lowest total'},{v:'pass',l:'Pass rate'},{v:'rating',l:'Top rated'}].map(({v,l})=><button key={v} className={`pill${sort===v?' on':''}`} onClick={()=>setSort(v)}>{l}</button>)}
        </div>
      </div>
    </div>

    <div className="wrap" style={{paddingTop:20,paddingBottom:20}}>
      <div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:20,alignItems:'start'}}>
        {/* Desktop sidebar */}
        <aside className="sidebar">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <span style={{fontWeight:800,fontSize:'var(--tmd)'}}>Filters</span>
            <button className="btn btn-ghost btn-sm" onClick={resetFilters}>Reset</button>
          </div>
          <FilterContent/>
        </aside>

        {/* Results */}
        <div>
          {/* Desktop col headers */}
          <div className="col-labels-d" style={{display:'grid',gridTemplateColumns:'48px 1fr 140px 152px 140px 168px',marginBottom:6,paddingLeft:0}}>
            <div/><div/>
            {['Hourly rate','Est. total','Pass rate','PassScore'].map(h=><div key={h} style={{textAlign:'center',fontSize:'var(--txs)',fontWeight:700,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.06em',padding:'0 8px'}}>{h}</div>)}
          </div>

          {loading
            ?[0,1,2].map(i=><SkeletonCard key={i}/>)
            :results.length===0
            ?<div className="card-s" style={{padding:40,textAlign:'center'}}><div style={{color:'var(--text3)',marginBottom:14}}>{I.search}</div><h3 style={{fontWeight:800,marginBottom:8}}>No instructors match</h3><p style={{color:'var(--text2)',fontSize:'var(--tsm)'}}>Try adjusting filters or raising max price.</p></div>
            :results.map((inst,idx)=>{
              const locked=isGuest&&idx>=3;
              const isTop=idx===0;
              const ps=inst.passScore;
              const pc_=ps>=85?'var(--green)':ps>=70?'var(--blue)':ps>=55?'var(--amber)':'var(--red)';
              const pCls=inst.rate<=ravg-3?'cm-green':inst.rate>=ravg+3?'cm-red':'cm-muted';
              const pClsD=inst.rate<=ravg-3?'met-green':inst.rate>=ravg+3?'met-red':'met-muted';
              const saving=results.length>1?results[results.length-1].total-inst.total:0;
              const isExp=expanded===inst.id;
              const expandPanel=isExp&&<div className="expand-panel">
                <div><div className="exp-title">Price trend</div><div className="mini-bars">{inst.history.map((p,i)=><div key={i} className={`mini-bar${i===inst.history.length-1?' now':''}`} style={{height:`${((p-20)/50)*100}%`,minHeight:4}}/>)}</div><Trend h={inst.history}/></div>
                <div><div className="exp-title">Score breakdown</div>{[{l:'Price score',v:Math.round(Math.max(0,Math.min(100,100-((inst.rate-20)/50)*100)))},{l:'Rating score',v:Math.round((inst.rating/5)*100)},{l:'Pass rate',v:inst.passRate}].map(({l,v})=><div key={l} style={{marginBottom:8}}><div style={{display:'flex',justifyContent:'space-between',fontSize:'var(--txs)',marginBottom:3}}><span style={{color:'var(--text2)'}}>{l}</span><strong>{v}</strong></div><div className="prog"><div className="prog-fill" style={{width:`${v}%`}}/></div></div>)}</div>
                <div><div className="exp-title">Lesson types</div><div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:12}}>{inst.types.map(l=><span key={l} className="chip ch-blue">{l}</span>)}</div><div className="exp-title">Transmission</div><div style={{display:'flex',gap:5}}>{inst.tx.map(t=><span key={t} className="chip ch-gray">{t}</span>)}</div></div>
                <div><div className="exp-title">About</div><p style={{fontSize:'var(--txs)',color:'var(--text2)',lineHeight:1.65,marginBottom:8}}>{inst.bio}</p>{inst.support.length>0&&<><div className="exp-title">Support</div><div style={{display:'flex',gap:5,flexWrap:'wrap'}}>{inst.support.map(s=><span key={s} className="chip ch-green">{s}</span>)}</div></>}</div>
              </div>;

              // Mobile card
              const mobileCard=<div className={`inst-card-m${isTop&&sort==='passscore'?' featured':''} ${isTop&&sort==='rate'?' best':''}`} onClick={()=>!locked&&setExpanded(isExp?null:inst.id)}>
                {isTop&&sort==='passscore'&&<div className="card-banner cb-blue">Best PassScore in your area</div>}
                {isTop&&sort==='rate'&&<div className="card-banner cb-green">Cheapest hourly rate</div>}
                <div className="card-head">
                  <img src={inst.avatar} alt={inst.name} className="card-avatar" loading="lazy"/>
                  <div className="card-info">
                    <div className="card-name">{inst.name}</div>
                    <div className="card-meta">
                      <Stars r={inst.rating}/><span style={{fontWeight:700}}>{inst.rating}</span><span>({inst.reviews})</span>
                      {inst.passRate>=90&&<span className="exc-badge">{I.award} 90%+ pass</span>}
                    </div>
                    <div className="card-chips">
                      <span style={{fontSize:'var(--txs)',color:'var(--text3)',display:'flex',alignItems:'center',gap:3}}>{I.pin} {inst.area} · {inst.dist.toFixed(1)}mi</span>
                      <span style={{display:'flex',alignItems:'center',gap:4,fontSize:'var(--txs)',color:'var(--text3)'}}><AvailDot s={inst.avail}/>{inst.avail}</span>
                      {inst.tier==='Premium'&&<span className="spons">SPONSORED</span>}
                    </div>
                  </div>
                </div>
                <div className="card-metrics">
                  <div className={`cm-cell ${pCls}`}><div className="cm-big">£{inst.rate}</div><div className="cm-lbl">per hour</div><Bench rate={inst.rate} avg={ravg}/></div>
                  <div className="cm-cell cm-blue"><div className="cm-big" style={{fontSize:'clamp(14px,4vw,20px)'}}>£{inst.total.toLocaleString()}</div><div className="cm-lbl">est. total</div><div className="cm-sub">{hrs}h × £{inst.rate}</div></div>
                  <div className="cm-cell" style={{position:'relative'}}><div className="ps-n" style={{color:pc_}}>{ps}</div><div className="cm-lbl">PassScore</div><div className="ps-bar"><div className="ps-fill" style={{width:`${ps}%`,background:pc_}}/></div></div>
                </div>
                <div className="card-actions">
                  <button className="btn btn-p btn-full btn-sm" onClick={e=>{e.stopPropagation();inst.avail==='Full'?onWaitlist(inst):onBook(inst);}}>
                    {inst.avail==='Full'?'Join waitlist':'Book lesson'}
                  </button>
                  <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();onProfile(inst.id);}}>Profile</button>
                </div>
                {expandPanel}
              </div>;

              // Desktop row
              const desktopRow=<div className={`inst-row-d${isTop&&sort==='passscore'?' featured':''} ${isTop&&sort==='rate'?' best':''}`} onClick={()=>setExpanded(isExp?null:inst.id)}>
                {isTop&&sort==='passscore'&&<div className="card-banner cb-blue">Best PassScore in your area</div>}
                {isTop&&sort==='rate'&&<div className="card-banner cb-green">Cheapest hourly rate</div>}
                <div className="row-grid">
                  <div className={`rank-c${idx<3?` r${idx+1}`:''}`}><span className="rank-n">#{idx+1}</span></div>
                  <div className="info-c">
                    <img src={inst.avatar} alt={inst.name} className="d-avatar" loading="lazy"/>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="d-name">{inst.name}</div>
                      <div className="d-meta"><Stars r={inst.rating}/><span style={{fontWeight:700}}>{inst.rating}</span><span>({inst.reviews})</span>{inst.passRate>=90&&<span className="exc-badge">{I.award} 90%+</span>}{inst.tier==='Premium'&&<span className="spons">SPONSORED</span>}</div>
                      <div className="d-chips"><span style={{fontSize:'var(--txs)',color:'var(--text3)',display:'flex',alignItems:'center',gap:3}}>{I.pin} {inst.area} · {inst.dist.toFixed(1)}mi</span><span style={{display:'flex',alignItems:'center',gap:4,fontSize:'var(--txs)',color:'var(--text3)'}}><AvailDot s={inst.avail}/>{inst.avail}</span>{saving>80&&<span className="chip ch-green">Save £{Math.round(saving)}</span>}</div>
                    </div>
                  </div>
                  <div className={`met-c ${pClsD}`}><div className="met-big">£{inst.rate}</div><div className="met-lbl">per hour</div><Bench rate={inst.rate} avg={ravg}/></div>
                  <div className="met-c met-blue"><div className="met-big" style={{fontSize:'clamp(15px,1.8vw,20px)'}}>£{inst.total.toLocaleString()}</div><div className="met-lbl">est. total</div><div className="met-sub">{hrs} hrs × £{inst.rate}</div></div>
                  <div className={`met-c ${inst.passRate>=90?'met-green':inst.passRate>=80?'met-muted':'met-amber'}`}><div className="met-big">{inst.passRate}%</div><div className="met-lbl">pass rate</div><div className="met-sub">UK avg 47%</div></div>
                  <div className="act-c">
                    <div style={{textAlign:'center'}}><div className="ps-n" style={{color:pc_}}>{ps}</div><div style={{fontSize:'var(--txs)',fontWeight:800,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:2}}>PassScore</div><div className="ps-bar"><div className="ps-fill" style={{width:`${ps}%`,background:pc_}}/></div></div>
                    <button className="btn btn-p btn-sm btn-full" style={{fontSize:11}} onClick={e=>{e.stopPropagation();inst.avail==='Full'?onWaitlist(inst):onBook(inst);}}>{inst.avail==='Full'?'Waitlist':'Book lesson'}</button>
                    <button className="btn btn-ghost btn-sm btn-full" style={{fontSize:11}} onClick={e=>{e.stopPropagation();onProfile(inst.id);}}>Full profile</button>
                  </div>
                </div>
                {expandPanel}
              </div>;

              if(locked) return<div key={`gate-${inst.id}`} className="gate-wrap">
                <div className="gate-blur">{mobileCard}{desktopRow}</div>
                <div className="gate-panel"><div style={{color:'var(--text3)',marginBottom:10,display:'flex',justifyContent:'center'}}>{I.lock}</div><div className="gate-h">See all {results.length}</div><p className="gate-sub">Sign up free to unlock the full comparison.</p><button className="btn btn-p btn-full btn-lg" onClick={()=>onNav('learnerSignup')}>Unlock all — free</button><p style={{fontSize:'var(--txs)',color:'var(--text4)',marginTop:10}}>No card. 30 seconds.</p></div>
              </div>;

              return<React.Fragment key={inst.id}>{mobileCard}{desktopRow}</React.Fragment>;
            })
          }

          {!loading&&results.length>0&&<div style={{marginTop:16,padding:'12px 16px',background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:'var(--r)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
            <span style={{fontSize:'var(--txs)',color:'var(--text3)'}}>Results include sponsored placements. Pass rates self-reported.</span>
            <button onClick={()=>onNav('rankingMethod')} style={{background:'none',border:'none',color:'var(--blue)',fontSize:'var(--txs)',fontWeight:700,cursor:'pointer',textDecoration:'underline'}}>How we rank</button>
          </div>}
        </div>
      </div>
    </div>

    {/* Mobile filter FAB */}
    <button className="filter-btn-mobile" onClick={()=>setSheetOpen(true)}>{I.filter} Filters {specs.length+(!verOnly?0:1)>0&&<span style={{background:'var(--blue)',color:'#fff',borderRadius:'50%',width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800}}>{specs.length+(!verOnly?0:1)}</span>}</button>

    {/* Filter bottom sheet */}
    {sheetOpen&&<>
      <div className="sheet-overlay" onClick={()=>setSheetOpen(false)}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div className="sheet-title">Filters</div>
          <div style={{display:'flex',gap:8}}><button className="btn btn-ghost btn-sm" onClick={resetFilters}>Reset</button><button className="btn btn-p btn-sm" onClick={()=>setSheetOpen(false)}>Apply</button></div>
        </div>
        <FilterContent/>
      </div>
    </>}
    <style>{`@media(max-width:639px){aside{display:none}.col-labels-d{display:none}}`}</style>
  </>;
};

// ─── INSTRUCTOR PROFILE PAGE ───────────────────────────────────────────────

                  <h1 style={{fontSize:'var(--t2xl)',fontWeight:900,letterSpacing:'-.02em',marginBottom:8}}>{i.name}</h1>

                </div>

// ─── MESSAGES PAGE ────────────────────────────────────────────────────────
const MessagesPage=({learner,insts})=>{
  const [activeThread,setActiveThread]=useState(1);
  const [draft,setDraft]=useState('');
  const [msgs,setMsgs]=useState(MOCK_MESSAGES);
  const inst=insts.find(i=>i.id===activeThread)||insts[0];
  const threads=insts.slice(0,3);
  const send=()=>{if(!draft.trim())return;setMsgs(p=>[...p,{id:Date.now(),fromLearner:true,text:draft,time:'Just now'}]);setDraft('');};

  return<div className="wrap page" style={{paddingTop:'var(--sp6)',paddingBottom:80}}>
    <h1 style={{fontSize:'var(--t2xl)',fontWeight:900,letterSpacing:'-.02em',marginBottom:'var(--sp6)'}}>Messages</h1>
    <div style={{display:'grid',gridTemplateColumns:'240px 1fr',gap:16,height:'60vh',minHeight:400}}>
      <div className="card-s" style={{overflow:'hidden'}}>
        {threads.map(t=><div key={t.id} onClick={()=>setActiveThread(t.id)} style={{padding:'12px 16px',cursor:'pointer',background:activeThread===t.id?'var(--bluegl)':'transparent',borderLeft:activeThread===t.id?'3px solid var(--blue)':'3px solid transparent',display:'flex',gap:10,alignItems:'center',transition:'all .15s'}}>
          <img src={t.avatar} style={{width:36,height:36,borderRadius:'50%',objectFit:'cover',flexShrink:0}} alt="" loading="lazy"/>
          <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:'var(--tsm)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div><div style={{fontSize:'var(--txs)',color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Tap to view</div></div>
          {t.id===1&&<span className="unread-dot"/>}
        </div>)}
      </div>
      <div className="card-s" style={{display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
          <img src={inst.avatar} style={{width:36,height:36,borderRadius:'50%',objectFit:'cover'}} alt="" loading="lazy"/>
          <div><div style={{fontWeight:700,fontSize:'var(--tsm)'}}>{inst.name}</div><div style={{fontSize:'var(--txs)',color:'var(--green)',display:'flex',alignItems:'center',gap:4}}><AvailDot s={inst.avail}/>{inst.avail}</div></div>
        </div>
        <div style={{flex:1,overflow:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}}>
          {msgs.map(m=><div key={m.id} style={{display:'flex',flexDirection:'column',alignItems:m.fromLearner?'flex-end':'flex-start'}}>
            <div className={`msg-bubble ${m.fromLearner?'msg-out':'msg-in'}`}>{m.text}</div>
            <div className="msg-time">{m.time}</div>
          </div>)}
        </div>
        <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',display:'flex',gap:8}}>
          <input className="input" value={draft} onChange={e=>setDraft(e.target.value)} placeholder="Type a message…" onKeyDown={e=>e.key==='Enter'&&send()} style={{minHeight:40}}/>
          <button className="btn btn-p btn-sm" onClick={send}>{I.send}</button>
        </div>
      </div>
    </div>
    <style>{`@media(max-width:639px){.wrap>div[style*="grid-template-columns: 240px"]{grid-template-columns:1fr!important;height:auto}.wrap>div[style*="grid-template-columns: 240px"]>div:first-child{height:140px;overflow-x:auto;display:flex;flex-direction:row}.wrap>div[style*="grid-template-columns: 240px"]>div:first-child>div{min-width:160px;flex-direction:column;border-left:none!important;border-bottom:2px solid transparent}.wrap>div[style*="grid-template-columns: 240px"]>div:last-child{height:360px}}`}</style>
  </div>;
};

// ─── BOOKING MODAL ────────────────────────────────────────────────────────
const BookModal=({inst,pkg,onClose})=>{
  const [date,setDate]=useState('');
  const [time,setTime]=useState('');
  const [msg,setMsg]=useState('');
  const [sent,setSent]=useState(false);
  const [sending,setSending]=useState(false);
  const doBook=async()=>{setSending(true);await sendEmailRelay(inst.email,'New booking request',`From learner. Date: ${date}, Time: ${time}. Message: ${msg}`);setSending(false);setSent(true);};
  return<Modal open={true} onClose={onClose} title={pkg?`Book: ${pkg.name}`:`Book with ${inst.name}`}
    footer={!sent&&<><button className="btn btn-ghost btn-full" onClick={onClose}>Cancel</button><button className="btn btn-p btn-full btn-lg" disabled={!date||!time||sending} onClick={doBook}>{sending?'Sending…':'Send request'}</button></>}>
    {sent?<div style={{textAlign:'center',padding:'16px 0'}}>
      <div style={{color:'var(--green)',marginBottom:14,display:'flex',justifyContent:'center'}}>{I.check}</div>
      <h3 style={{fontSize:'var(--txl)',fontWeight:900,letterSpacing:'-.02em',marginBottom:8}}>Request sent!</h3>
      <p style={{color:'var(--text2)',fontSize:'var(--tsm)',lineHeight:1.6,marginBottom:4}}><strong>{inst.name}</strong> will confirm within 24 hours.</p>
      <p style={{fontSize:'var(--txs)',color:'var(--text3)'}}>A confirmation email has been sent to your inbox.</p>
      <button className="btn btn-p" style={{marginTop:20}} onClick={onClose}>Done</button>
    </div>
    :<div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',gap:12,padding:14,background:'var(--bg1)',borderRadius:'var(--r)',alignItems:'center'}}>
        <img src={inst.avatar} style={{width:44,height:44,borderRadius:'50%',objectFit:'cover'}} alt="" loading="lazy"/>
        <div><div style={{fontWeight:800}}>{inst.name}</div><div style={{fontSize:'var(--txs)',color:'var(--text3)'}}>£{inst.rate}/hr · {inst.passRate}% pass · {inst.area}</div></div>
      </div>
      {pkg&&<div className="callout cal-blue"><strong style={{color:'var(--blue)'}}>Package: </strong>{pkg.name} — {pkg.lessons} lessons for £{pkg.price}</div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="field"><span className="label">Date</span><input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)} min={new Date().toISOString().split('T')[0]}/></div>
        <div className="field"><span className="label">Time</span><select className="select" value={time} onChange={e=>setTime(e.target.value)}><option value="">Pick a time…</option>{['8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM'].map(t=><option key={t}>{t}</option>)}</select></div>
      </div>
      <div className="field"><span className="label">Message (optional)</span><textarea className="input" value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Any focus areas, accessibility needs, or questions…"/></div>
    </div>}
  </Modal>;
};

// ─── WAITLIST MODAL ───────────────────────────────────────────────────────
const WaitlistModal=({inst,onClose})=>{
  const [sent,setSent]=useState(false);
  const join=async()=>{await sendEmailRelay(inst.email,'New waitlist signup',`Learner joined waitlist for ${inst.name}`);setSent(true);};
  return<Modal open={true} onClose={onClose} title="Join Waitlist" footer={!sent&&<><button className="btn btn-ghost btn-full" onClick={onClose}>Cancel</button><button className="btn btn-p btn-full btn-lg" onClick={join}>Join waitlist</button></>}>
    {sent?<div style={{textAlign:'center',padding:16}}><div style={{color:'var(--green)',marginBottom:12,display:'flex',justifyContent:'center'}}>{I.check}</div><h3 style={{fontWeight:900,marginBottom:8}}>You're on the waitlist</h3><p style={{color:'var(--text2)',fontSize:'var(--tsm)'}}>We'll email you the moment a slot opens with <strong>{inst.name}</strong>.</p><button className="btn btn-p" style={{marginTop:20}} onClick={onClose}>Done</button></div>
    :<div><div style={{display:'flex',gap:12,padding:14,background:'var(--bg1)',borderRadius:'var(--r)',alignItems:'center',marginBottom:16}}><img src={inst.avatar} style={{width:44,height:44,borderRadius:'50%'}} alt="" loading="lazy"/><div><div style={{fontWeight:800}}>{inst.name}</div><div style={{fontSize:'var(--txs)',color:'var(--red)',fontWeight:700}}>Fully booked</div></div></div><p style={{color:'var(--text2)',fontSize:'var(--tsm)',lineHeight:1.65}}>Join the waitlist and we'll notify you by email the moment a slot becomes available. No commitment required.</p></div>}
  </Modal>;
};

const QuizPage=({quiz,onFinish,isGuest,onNav})=>{
  const [idx,setIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [ans,setAns]=useState(false);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const q=quiz.questions[idx];
  const answer=i=>{if(ans)return;setSel(i);setAns(true);if(i===q.correct)setScore(s=>s+1);};
  const next=()=>{if(idx<quiz.questions.length-1){setIdx(i=>i+1);setSel(null);setAns(false);}else setDone(true);};

  if(!q)return<div className="wrap" style={{paddingTop:40,textAlign:'center'}}><p style={{color:'var(--text2)'}}>No questions yet for this topic.</p><button className="btn btn-ghost" style={{marginTop:12}} onClick={()=>onFinish(0,0,quiz.topic)}>{I.aL} Back</button></div>;

  if(done){
    const pct=Math.round(score/quiz.questions.length*100);
    const c=pct>=75?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
    return<div className="wrap page" style={{paddingTop:40}}>
      <div className="card-s" style={{maxWidth:460,margin:'0 auto',padding:40,textAlign:'center',borderRadius:'var(--r2xl)'}}>
        <h2 style={{fontSize:'var(--t2xl)',fontWeight:900,letterSpacing:'-.02em',marginBottom:6}}>Quiz complete</h2>
        <div style={{fontSize:64,fontWeight:900,color:c,letterSpacing:'-.03em',margin:'20px 0',lineHeight:1}}>{pct}%</div>
        <p style={{color:'var(--text2)',fontSize:'var(--tsm)',marginBottom:24}}>{score} of {quiz.questions.length} correct</p>
        {isGuest?<>
          <div style={{background:'var(--bg2)',border:'1px solid var(--borderh)',borderRadius:'var(--rlg)',padding:20,marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:'var(--tmd)',marginBottom:6}}>Save this score</div>
            <p style={{fontSize:'var(--tsm)',color:'var(--text2)',lineHeight:1.6,marginBottom:14}}>Create a free account to track progress and unlock your dashboard.</p>
            <button className="btn btn-p btn-full btn-lg" onClick={()=>onNav('learnerSignup')}>Save progress — free</button>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost btn-full" onClick={()=>onFinish(score,quiz.questions.length,quiz.topic)}>Back to hub</button>
            <button className="btn btn-ghost btn-full" onClick={()=>{setIdx(0);setSel(null);setAns(false);setScore(0);setDone(false);}}>{I.refresh} Retry</button>
          </div>
        </>:<div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost btn-full" onClick={()=>onFinish(score,quiz.questions.length,quiz.topic)}>Back to hub</button>
          <button className="btn btn-p btn-full" onClick={()=>{setIdx(0);setSel(null);setAns(false);setScore(0);setDone(false);}}>{I.refresh} Try again</button>
        </div>}
      </div>
    </div>;
  }

  return<div className="wrap page" style={{paddingTop:'var(--sp6)',maxWidth:580,margin:'0 auto',paddingBottom:80}}>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:'var(--txs)',color:'var(--text3)',marginBottom:8}}><span>Q{idx+1}/{quiz.questions.length}</span><span>{score} correct</span></div>
    <div className="prog" style={{marginBottom:20}}><div className="prog-fill" style={{width:`${(idx/quiz.questions.length)*100}%`}}/></div>
    <div className="card-s" style={{padding:'var(--sp6)',borderRadius:'var(--rxl)'}}>
      <h2 style={{fontSize:'var(--txl)',fontWeight:800,letterSpacing:'-.01em',marginBottom:20,lineHeight:1.3}}>{q.text}</h2>
      {q.opts.map((opt,i)=>{
        let cls='q-opt';
        if(ans&&i===q.correct)cls+=' correct';
        else if(ans&&i===sel)cls+=' wrong';
        return<button key={i} className={cls} onClick={()=>answer(i)} disabled={ans}><span>{opt}</span>{ans&&i===q.correct&&<span style={{color:'var(--green)'}}>{I.check}</span>}{ans&&i===sel&&i!==q.correct&&<span style={{color:'var(--red)'}}>{I.x}</span>}</button>;
      })}
      {ans&&<div className="callout cal-blue" style={{marginTop:12}}><span style={{color:'var(--blue)',fontWeight:700}}>Explanation: </span>{q.explain}</div>}
      <div style={{textAlign:'right',marginTop:16}}><button className="btn btn-p" onClick={next} disabled={!ans}>{idx<quiz.questions.length-1?'Next':'Finish'} {I.aR}</button></div>
    </div>
  </div>;
};

const App=()=>{
  const [view,setView]=useState('home');
  const [insts,setInsts]=useState(INSTS);
  const [learners,setLearners]=useState(LEARNERS);
  const [selId,setSelId]=useState(null);
  const [sp,setSp]=useState(null);
  const [lu,setLu]=useState(null);
  const [iu,setIu]=useState(null);
  const [admin,setAdmin]=useState(null);
  const [bookInst,setBookInst]=useState(null);
  const [bookPkg,setBookPkg]=useState(null);
  const [waitInst,setWaitInst]=useState(null);
  const [topics,setTopics]=useState(THEORY);
  const [prog,setProg]=useState(PROG);
  const [quiz,setQuiz]=useState(null);
  const [cookie,setCookie]=useState(()=>localStorage.getItem('pp_c'));
  const [lc,setLc]=useState(0);

  const nav=useCallback(v=>{
    window.scrollTo(0,0);
    if(v==='dashboard'&&!lu){setView('learnerLogin');return;}
    if(v==='messages'&&!lu){setView('learnerLogin');return;}
    setView(v);
  },[lu]);

  // Body class management
  useEffect(()=>{
    const noBottomPad=['instructorPortal','adminDashboard','adminLogin'].includes(view)&&(iu||admin);
    document.body.classList.toggle('no-bottom-pad',!!noBottomPad);
  },[view,iu,admin]);

  const render=()=>{
    if(admin&&view==='adminDashboard')return<AdminDash insts={insts} learners={learners} onApprove={id=>setInsts(p=>p.map(i=>i.id===id?{...i,verified:true,dvsaStatus:'Verified'}:i))} onLogout={()=>{setAdmin(null);nav('home');}}/>;
    if(view==='adminLogin')return<AdminLogin onLogin={()=>{setAdmin('SuperAdmin');setView('adminDashboard');}}/>;
    switch(view){
      case 'home':     return<Home onNav={nav} onSearch={p=>{setSp(p);setView('compare');}}/>;
      case 'compare':  return<ComparePage insts={insts} sp={sp} isGuest={!lu} onNav={nav} onProfile={id=>{setSelId(id);setView('profile');}} onBook={i=>setBookInst(i)} onWaitlist={i=>setWaitInst(i)}/>;
      case 'profile':  {const i=insts.find(x=>x.id===selId);return i?<InstProfile inst={i} exp={sp?.exp} postcode={sp?.postcode} onBack={()=>setView('compare')} onBook={(i,pkg)=>{setBookInst(i);setBookPkg(pkg||null);}} onMsg={i=>{if(!lu){nav('learnerLogin');return;}nav('messages');}} onWaitlist={i=>setWaitInst(i)} isGuest={!lu} onNav={nav}/>:<Home onNav={nav} onSearch={p=>{setSp(p);setView('compare');}}/>;  }
      case 'messages': return lu?<MessagesPage learner={lu} insts={insts}/>:<LearnerLogin onLogin={u=>{setLu(u);nav('messages');}} onNav={nav}/>;
      case 'theoryPractice':return<TheoryPage topics={topics} mockLeft={prog.mockLeft} isGuest={!lu} onNav={nav} onStart={t=>{setQuiz(t==='mock'?{topic:'mock',questions:MOCK_QS.slice(0,10)}:{topic:t,questions:t.questions});setView('quiz');}}/>;
      case 'quiz':     return quiz?<QuizPage quiz={quiz} isGuest={!lu} onNav={nav} onFinish={(s,tot,t)=>{if(t!=='mock')setTopics(p=>p.map(x=>x.id===t.id?{...x,progress:Math.max(x.progress,Math.round(s/tot*100))}:x));setProg(p=>({...p,mockLeft:t==='mock'?p.mockLeft-1:p.mockLeft}));setQuiz(null);nav('theoryPractice');}}/>:<TheoryPage topics={topics} mockLeft={prog.mockLeft} isGuest={!lu} onNav={nav} onStart={()=>{}}/>;
      case 'dashboard':return lu?<LearnerDash progress={prog} onNav={nav}/>:<LearnerLogin onLogin={u=>{setLu(u);nav('dashboard');}} onNav={nav}/>;
      case 'learnerLogin':  return<LearnerLogin onLogin={u=>{setLu(u);nav('dashboard');}} onNav={nav}/>;
      case 'learnerSignup': return<LearnerSignup onSignup={(name,email)=>{const u={...LEARNERS[0],id:99,name,email};setLearners(p=>[...p,u]);setLu(u);nav('compare');}} onNav={nav}/>;
      case 'instructorInfo':return<InstInfoPage onNav={nav}/>;
      case 'instructorLogin':return<InstLogin insts={insts} onLogin={i=>{setIu(i);nav('instructorPortal');}}/>;
      case 'instructorPortal':return iu?<InstPortal inst={iu} onUpdate={u=>{setInsts(p=>p.map(i=>i.id===u.id?u:i));setIu(u);}} onLogout={()=>{setIu(null);nav('home');}} allInsts={insts}/>:<InstLogin insts={insts} onLogin={i=>{setIu(i);nav('instructorPortal');}}/>;
      case 'rankingMethod': return<RankingMethodPage onBack={()=>setView('compare')}/>;
      case 'privacyPolicy': return<PrivacyPage onBack={()=>nav('home')}/>;
      default: return<Home onNav={nav} onSearch={p=>{setSp(p);setView('compare');}}/>;
    }
  };

  const isPortal=['instructorPortal','adminDashboard','adminLogin'].includes(view)&&(iu||admin);

  return<>
    <Header view={view} onNav={nav} learner={lu} onLogout={()=>{setLu(null);nav('home');}} inst={iu} onInstOut={()=>{setIu(null);nav('home');}} logoClicks={lc} setLC={setLc}/>
    <div className="page" key={view}>{render()}</div>
    {!isPortal&&<footer style={{borderTop:'1px solid var(--border)',padding:'16px var(--sp6)',textAlign:'center',fontSize:'var(--txs)',color:'var(--text4)',marginTop:40,background:'var(--bg1)',paddingBottom:'calc(16px + env(safe-area-inset-bottom))'}}>
      <div className="wrap" style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <span>© {new Date().getFullYear()} PassPal AI Ltd.</span>
        <div style={{display:'flex',gap:16}}><button onClick={()=>nav('privacyPolicy')} style={{background:'none',border:'none',color:'var(--blue)',cursor:'pointer',fontSize:'var(--txs)'}}>Privacy</button><button onClick={()=>nav('rankingMethod')} style={{background:'none',border:'none',color:'var(--blue)',cursor:'pointer',fontSize:'var(--txs)'}}>How we rank</button></div>
      </div>
    </footer>}
    {!isPortal&&<BottomNav view={view} onNav={nav} learner={lu} inst={iu}/>}
    {bookInst&&<BookModal inst={bookInst} pkg={bookPkg} onClose={()=>{setBookInst(null);setBookPkg(null);}}/>}
    {waitInst&&<WaitlistModal inst={waitInst} onClose={()=>setWaitInst(null)}/>}
    {!cookie&&<div className="cookie"><p className="cookie-t">We use cookies to improve your experience. <button onClick={()=>nav('privacyPolicy')} style={{background:'none',border:'none',color:'var(--blue)',cursor:'pointer',fontSize:'inherit',textDecoration:'underline'}}>Privacy policy</button></p><div style={{display:'flex',gap:8}}><button className="btn btn-ghost btn-sm" onClick={()=>{setCookie('d');localStorage.setItem('pp_c','d');}}>Decline</button><button className="btn btn-p btn-sm" onClick={()=>{setCookie('a');localStorage.setItem('pp_c','a');}}>Accept</button></div></div>}
  </>;
};

/* ── SIMULATED SERVICES ───────────────────────────────────────────── */
const simulateDVSA=async ref=>{
  await new Promise(r=>setTimeout(r,1400));
  if(!ref||ref.length<8)return{ok:false,msg:'ADI reference not found in DVSA register.'};
  const found=INSTRUCTORS.find(i=>i.dvsaRef===ref);
  if(found)return{ok:true,name:found.name,grade:'A',renewed:'January 2027',badge:ref};
  return{ok:false,msg:'Reference not found. Please check your ADI certificate number.'};
};
const simulateEmail=async(to,subject,body)=>{
  await new Promise(r=>setTimeout(r,800));
  return{ok:true,id:`msg_${Date.now()}`,to,subject,preview:body.slice(0,120)};
};

/* ── BOTTOM SHEET ────────────────────────────────────────────────── */
const BottomSheet=({open,onClose,title,children})=>{
  if(!open)return null;
  return<>
    <div className="sheet-overlay" onClick={onClose}/>
    <div className="sheet">
      <div className="sheet-handle"/>
      <div className="sheet-hd">
        <span style={{fontWeight:800,fontSize:'var(--txl)'}}>{title}</span>
        <button className="close-btn" onClick={onClose}>{Ic.x}</button>
      </div>
      <div className="sheet-bd">{children}</div>
    </div>
  </>;
};

/* ── LEARNER DASHBOARD ────────────────────────────────────────────── */
const Dashboard=({progress:p,onNav})=>{
  const r=52,circ=2*Math.PI*r,dash=circ*(p.theoryProgress/100);
  return<div className="wrap page" style={{paddingTop:24,paddingBottom:80}}>
    <h1 style={{fontSize:'var(--t2xl)',fontWeight:900,letterSpacing:'-.02em',marginBottom:4}}>Your progress</h1>
    <p style={{color:'var(--text2)',marginBottom:22,fontSize:'var(--tsm)'}}>Keep going — you're on track.</p>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
      {[{l:'Lessons completed',v:p.lessonsCompleted,c:'var(--blue)'},{l:'Average saving',v:`£${p.avgSaving}/hr`,c:'var(--green)'},{l:'Pass readiness',v:`${p.passLikelihood}%`,c:'var(--amber)'}].map(({l,v,c})=>(
        <div key={l} className="mcard card-solid" style={{borderRadius:'var(--rlg)'}}>
          <div className="mcard-sub">{l}</div>
          <div className="mcard-n" style={{color:c}}>{v}</div>
        </div>
      ))}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card-solid" style={{padding:22,borderRadius:'var(--rxl)',display:'flex',flexDirection:'column',alignItems:'center'}}>
        <h3 style={{fontWeight:800,marginBottom:16,alignSelf:'flex-start'}}>Theory progress</h3>
        <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center',width:130,height:130}}>
          <svg width="130" height="130" viewBox="0 0 130 130" style={{transform:'rotate(-90deg)'}}>
            <circle cx="65" cy="65" r={r} fill="none" stroke="var(--bg3)" strokeWidth="9"/>
            <circle cx="65" cy="65" r={r} fill="none" stroke="var(--blue)" strokeWidth="9" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray .5s ease'}}/>
          </svg>
          <span style={{position:'absolute',fontSize:26,fontWeight:900,letterSpacing:'-.03em'}}>{p.theoryProgress}%</span>
        </div>
        <p style={{color:'var(--green)',fontWeight:700,marginTop:10,fontSize:'var(--tsm)'}}>Up {p.scoreTrend}% this week</p>
        <button className="btn btn-p btn-full" style={{marginTop:14}} onClick={()=>onNav('theoryPractice')}>Continue studying</button>
      </div>
      <div className="card-solid" style={{padding:22,borderRadius:'var(--rxl)'}}>
        <h3 style={{fontWeight:800,marginBottom:12}}>Recommended topics</h3>
        {p.recommended.map(t=><div key={t} style={{padding:'9px 12px',background:'var(--bg2)',border:'1px solid var(--bdr)',borderRadius:'var(--r)',fontSize:'var(--tsm)',marginBottom:8,color:'var(--text2)'}}>{t}</div>)}
        <h3 style={{fontWeight:800,margin:'16px 0 12px'}}>Badges</h3>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          {p.badges.map(b=><div key={b.name} style={{textAlign:'center',width:52}}>
            <div style={{width:44,height:44,background:'var(--ambergl)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--amber)',margin:'0 auto'}}>{Ic.award}</div>
            <div style={{fontSize:9,color:'var(--text3)',marginTop:4,lineHeight:1.3}}>{b.name}</div>
          </div>)}
        </div>
      </div>
    </div>
  </div>;
};

/* ── CONTACT FORM ────────────────────────────────────────────────── */
const ContactForm=({instructor,isGuest,onNav})=>{
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [msg,setMsg]=useState('');
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(null);
  const [err,setErr]=useState('');
  const send=async e=>{
    e.preventDefault();
    if(isGuest){onNav('learnerSignup');return;}
    setSending(true);setErr('');
    const result=await simulateEmail(instructor.email,`Lesson enquiry via PassPal — ${name}`,`From: ${name} (${email})\n\n${msg}`);
    setSending(false);
    if(result.ok)setSent(result);else setErr('Failed to send. Please try again.');
  };
  if(sent)return<div style={{textAlign:'center',padding:'16px 0'}}>
    <div style={{color:'var(--green)',marginBottom:12,display:'flex',justifyContent:'center'}}>{Ic.check}</div>
    <h3 style={{fontWeight:900,marginBottom:8,fontSize:'var(--txl)'}}>Message sent</h3>
    <p style={{color:'var(--text2)',fontSize:'var(--tsm)',lineHeight:1.6,marginBottom:16}}>Your enquiry has been delivered to <strong>{instructor.name}</strong>. They'll reply directly to your email.</p>
    <div style={{background:'var(--bg2)',border:'1px solid var(--bdr)',borderRadius:'var(--r)',padding:16,fontSize:'var(--tsm)',color:'var(--text2)',lineHeight:1.7,textAlign:'left'}}>
      <div style={{fontSize:'var(--txs)',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3}}>Subject</div>
      <div style={{color:'var(--text)',marginBottom:10}}>Lesson enquiry via PassPal — {name}</div>
      <div style={{fontSize:'var(--txs)',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3}}>Preview</div>
      <div>{msg.slice(0,100)}{msg.length>100?'…':''}</div>
    </div>
  </div>;
  if(isGuest)return<div style={{textAlign:'center',padding:'16px 0'}}>
    <p style={{color:'var(--text2)',fontSize:'var(--tsm)',marginBottom:16}}>Sign up free to send enquiries directly to instructors.</p>
    <button className="btn btn-p btn-full btn-lg" onClick={()=>onNav('learnerSignup')}>Sign up to send enquiry</button>
  </div>;
  return<form onSubmit={send} style={{display:'flex',flexDirection:'column',gap:14}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div className="field"><span className="lbl">Your name</span><input className="inp" value={name} onChange={e=>setName(e.target.value)} required/></div>
      <div className="field"><span className="lbl">Your email</span><input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
    </div>
    <div className="field"><span className="lbl">Message</span><textarea className="inp" rows={4} value={msg} onChange={e=>setMsg(e.target.value)} placeholder={`Hi ${instructor.name.split(' ')[0]}, I'm interested in booking lessons...`} required/></div>
    {err&&<p style={{color:'var(--red)',fontSize:'var(--tsm)'}}>{err}</p>}
    <button type="submit" className="btn btn-p btn-full btn-lg" disabled={sending}>
      {sending?'Sending…':<>{Ic.mail} Send enquiry</>}
    </button>
    <p style={{fontSize:'var(--txs)',color:'var(--text3)',textAlign:'center'}}>Delivered directly to the instructor. PassPal does not read your messages.</p>
  </form>;
};

/* ── QUOTE REQUEST MODAL ──────────────────────────────────────────── */
const QuoteRequestModal=({instructor,onClose,isGuest,onNav})=>{
  const [notes,setNotes]=useState('');
  const [sent,setSent]=useState(false);
  const send=async e=>{
    e.preventDefault();
    if(isGuest){onNav('learnerSignup');onClose();return;}
    await simulateEmail(instructor.email,'Quote request via PassPal',`Learner quote request.\nNotes: ${notes}`);
    setSent(true);
  };
  return<Modal open={true} onClose={onClose} title="Request a quote"
    footer={!sent&&<><button className="btn btn-ghost btn-full" onClick={onClose}>Cancel</button><button className="btn btn-p btn-full btn-lg" onClick={send}>Send request</button></>}>
    {sent
      ?<div style={{textAlign:'center',padding:'16px 0'}}>
          <div style={{color:'var(--green)',marginBottom:12,display:'flex',justifyContent:'center'}}>{Ic.check}</div>
          <h3 style={{fontWeight:900,marginBottom:6}}>Quote requested</h3>
          <p style={{color:'var(--text2)',fontSize:'var(--tsm)',lineHeight:1.6}}><strong>{instructor.name}</strong> will send you a personalised quote by email within 24 hours.</p>
          <button className="btn btn-p" style={{marginTop:16}} onClick={onClose}>Done</button>
        </div>
      :<div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'flex',gap:12,alignItems:'center',padding:14,background:'var(--bg1)',borderRadius:'var(--r)'}}>
            <img src={instructor.avatar} style={{width:44,height:44,borderRadius:'50%',objectFit:'cover'}} alt="" loading="lazy"/>
            <div>
              <div style={{fontWeight:800}}>{instructor.name}</div>
              <div style={{fontSize:'var(--txs)',color:'var(--text3)'}}>£{instructor.rate}/hr · {instructor.passRate}% pass rate</div>
            </div>
          </div>
          <div className="field"><span className="lbl">Special requirements?</span>
            <textarea className="inp" rows={3} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="e.g. block booking discount, specific times, accessibility needs…"/>
          </div>
          <div className="cl-info callout">
            <strong style={{color:'var(--blue)'}}>How it works: </strong>The instructor will email you a quote within 24 hours. No obligation to book.
          </div>
        </div>
    }
  </Modal>;
};

/* ── REVIEW MODAL ────────────────────────────────────────────────── */
const ReviewModal=({instructor,onClose,onSubmit})=>{
  const [rating,setRating]=useState(0);
  const [text,setText]=useState('');
  const [hover,setHover]=useState(0);
  const submit=e=>{e.preventDefault();if(!rating)return;onSubmit(instructor.id,rating,text);onClose();};
  return<Modal open={true} onClose={onClose} title={`Review ${instructor.name.split(' ')[0]}`}
    footer={<><button className="btn btn-ghost btn-full" onClick={onClose}>Cancel</button><button className="btn btn-p btn-full btn-lg" disabled={!rating} onClick={submit}>Submit review</button></>}>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div>
        <div className="lbl" style={{marginBottom:10}}>Your rating</div>
        <div style={{display:'flex',gap:6}}>
          {[1,2,3,4,5].map(n=><button key={n} type="button"
            style={{background:'none',border:'none',cursor:'pointer',color:n<=(hover||rating)?'var(--amber)':'var(--text3)',fontSize:32,lineHeight:1,padding:4,minWidth:44,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center',transition:'color .15s'}}
            onMouseEnter={()=>setHover(n)} onMouseLeave={()=>setHover(0)} onClick={()=>setRating(n)}>★</button>)}
        </div>
        {rating>0&&<div style={{fontSize:'var(--txs)',color:'var(--text3)',marginTop:4}}>{['','Poor','Okay','Good','Great','Excellent!'][rating]}</div>}
      </div>
      <div className="field"><span className="lbl">Your review</span>
        <textarea className="inp" rows={4} value={text} onChange={e=>setText(e.target.value)} placeholder="Tell other learners about your experience…" required/>
      </div>
    </div>
  </Modal>;
};

      Complaints: ranking@passpal.ai · PassPal AI is a comparison service and does not endorse individual instructors.
    </div>
  </div>
</div>;


ReactDOM.render(<App/>,document.getElementById('root'));
</script>
