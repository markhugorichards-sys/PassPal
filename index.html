<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <meta name="color-scheme" content="only light">

  <!-- ── Primary SEO ─────────────────────────────────────── -->
  <title>Compare Driving Instructors Near You | Passd-AI</title>
  <meta name="description" content="Find and compare DVSA-approved driving instructors near you. See prices, read verified reviews, and book driving lessons instantly. Free for learners.">
  <meta name="keywords" content="driving lessons, driving instructors near me, compare driving instructors, DVSA approved ADI, cheap driving lessons UK, book driving lessons, pass your driving test">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
  <meta name="author" content="Passd-AI">
  <link rel="canonical" href="https://passd-ai.co.uk/">

  <!-- ── Open Graph ───────────────────────────────────────── -->
  <meta property="og:type"         content="website">
  <meta property="og:site_name"    content="Passd-AI">
  <meta property="og:title"        content="Compare Driving Instructors Near You | Passd-AI">
  <meta property="og:description"  content="Find and compare DVSA-approved driving instructors near you. See prices, read verified reviews, and book instantly.">
  <meta property="og:url"          content="https://passd-ai.co.uk/">
  <meta property="og:image"        content="https://passd-ai.co.uk/og-image.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt"    content="Passd-AI — Compare Driving Instructors">
  <meta property="og:locale"       content="en_GB">

  <!-- ── Twitter / X ─────────────────────────────────────── -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Compare Driving Instructors Near You | Passd-AI">
  <meta name="twitter:description" content="Find and compare DVSA-approved driving instructors near you. Free for learners.">
  <meta name="twitter:image"       content="https://passd-ai.co.uk/og-image.png">

  <!-- ── UK Geo ───────────────────────────────────────────── -->
  <meta name="geo.region"    content="GB">
  <meta name="geo.placename" content="United Kingdom">
  <meta name="language"      content="en-GB">

  <!-- ── Icons ────────────────────────────────────────────── -->
  <link rel="icon"             href="/favicon.ico"            sizes="32x32">
  <link rel="icon"             href="/favicon.svg"            type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"   sizes="180x180">
  <link rel="manifest"         href="/site.webmanifest">

  <!-- ── Font: async load, no render block ────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  </noscript>

  <!-- ── Schema.org JSON-LD ───────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://passd-ai.co.uk/#organization",
        "name": "Passd-AI",
        "legalName": "HHR Holdings Ltd",
        "description": "UK driving instructor comparison marketplace. Find and compare DVSA-approved driving instructors near you.",
        "url": "https://passd-ai.co.uk",
        "logo": {
          "@type": "ImageObject",
          "url": "https://passd-ai.co.uk/logo.svg",
          "width": 120,
          "height": 40
        },
        "address": { "@type": "PostalAddress", "addressCountry": "GB" },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "hello@passd-ai.co.uk",
          "availableLanguage": "English"
        }
      },
      {
        "@type": "WebSite",
        "@id": "https://passd-ai.co.uk/#website",
        "url": "https://passd-ai.co.uk",
        "name": "Passd-AI",
        "publisher": { "@id": "https://passd-ai.co.uk/#organization" },
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://passd-ai.co.uk/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@type": "WebPage",
        "@id": "https://passd-ai.co.uk/#webpage",
        "url": "https://passd-ai.co.uk",
        "name": "Compare Driving Instructors Near You | Passd-AI",
        "description": "Find and compare DVSA-approved driving instructors near you. See prices, read verified reviews, and book instantly.",
        "isPartOf": { "@id": "https://passd-ai.co.uk/#website" },
        "about": { "@id": "https://passd-ai.co.uk/#organization" },
        "inLanguage": "en-GB"
      }
    ]
  }
  </script>

  <!-- ── Critical inline CSS (prevents FOUC on first paint) ─ -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{color-scheme:only light}
    body{font-family:'Inter',system-ui,sans-serif;background:#f0f2f5;color:#0f1724;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    #root{min-height:100svh}
    /* Prevent layout shift: reserve header + tabbar space */
    .hdr{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #e2e8f0;height:56px}
    .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#fff;border-top:1px solid #e2e8f0;height:60px}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
