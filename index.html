<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPal AI — Compare. Save. Pass.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Satoshi:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080c14;
  --bg-1:    #0d1220;
  --bg-2:    #111827;
  --bg-3:    #1a2236;
  --glass:   rgba(255,255,255,.04);
  --glass-b: rgba(255,255,255,.08);
  --border:  rgba(255,255,255,.07);
  --border-h:rgba(255,255,255,.14);

  --blue:    #4f8fff;
  --blue-d:  #3a6fe0;
  --blue-gl: rgba(79,143,255,.15);
  --green:   #00e676;
  --green-d: #00c864;
  --green-gl:rgba(0,230,118,.12);
  --amber:   #ffb300;
  --amber-gl:rgba(255,179,0,.12);
  --red:     #ff4d6a;
  --red-gl:  rgba(255,77,106,.12);
  --purple:  #b66dff;

  --text:    #f0f4ff;
  --text-2:  #8a9bc4;
  --text-3:  #4a5880;
  --text-4:  #2a3550;

  --r:       10px;
  --r-lg:    16px;
  --r-xl:    22px;
  --r-2xl:   28px;

  --t-xs:    clamp(10px,1.1vw,11px);
  --t-sm:    clamp(12px,1.3vw,13px);
  --t-base:  clamp(14px,1.5vw,15px);
  --t-md:    clamp(15px,1.7vw,16px);
  --t-lg:    clamp(17px,2vw,19px);
  --t-xl:    clamp(20px,2.5vw,24px);
  --t-2xl:   clamp(28px,3.5vw,38px);
  --t-3xl:   clamp(36px,5vw,56px);
  --t-hero:  clamp(40px,7vw,80px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Satoshi', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-size: var(--t-base);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }

/* ── Keyframes ── */
@keyframes fadeUp   { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }
@keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
@keyframes countUp  { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:scale(1); } }
@keyframes spinLoader { to { transform:rotate(360deg); } }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes meshMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
@keyframes glow     { 0%,100%{opacity:.6} 50%{opacity:1} }
@keyframes slideDown{ from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }

.fade-up  { animation: fadeUp  .4s cubic-bezier(.22,.68,0,1.2) both; }
.fade-in  { animation: fadeIn  .25s ease both; }
.d1 { animation-delay:.07s; }
.d2 { animation-delay:.14s; }
.d3 { animation-delay:.21s; }
.d4 { animation-delay:.28s; }
.d5 { animation-delay:.35s; }

/* ── Layout ── */
.wrap    { max-width:1160px; margin:0 auto; padding:0 24px; }
.wrap-sm { max-width:700px;  margin:0 auto; padding:0 24px; }

/* ── Mesh background ── */
.mesh {
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(79,143,255,.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(0,230,118,.10) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 60% 10%, rgba(182,109,255,.08) 0%, transparent 50%),
    var(--bg-1);
}
.mesh-subtle {
  background:
    radial-gradient(ellipse 60% 40% at 10% 50%, rgba(79,143,255,.06) 0%, transparent 55%),
    var(--bg);
}

/* ── Cards ── */
.card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.card-solid {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
}
.card-hover {
  transition: all .22s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.card-hover:hover {
  border-color: var(--border-h);
  background: var(--glass-b);
  transform: translateY(-3px);
  box-shadow: 0 16px 40px rgba(0,0,0,.4), 0 0 0 1px var(--border-h);
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 11px 22px; border-radius: var(--r); font-family: inherit;
  font-size: var(--t-sm); font-weight: 700; border: none; cursor: pointer;
  transition: all .18s; white-space: nowrap; text-decoration: none; letter-spacing: .01em;
}
.btn:active { transform: scale(.96); }
.btn-primary {
  background: var(--blue); color: #fff;
  box-shadow: 0 0 24px rgba(79,143,255,.35), 0 2px 8px rgba(0,0,0,.3);
}
.btn-primary:hover { background: var(--blue-d); box-shadow: 0 0 36px rgba(79,143,255,.5), 0 4px 16px rgba(0,0,0,.4); transform: translateY(-1px); }
.btn-green {
  background: var(--green); color: #001a0e;
  box-shadow: 0 0 20px rgba(0,230,118,.3);
}
.btn-green:hover { background: var(--green-d); box-shadow: 0 0 32px rgba(0,230,118,.45); transform: translateY(-1px); }
.btn-ghost {
  background: var(--glass); color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border-h); color: var(--text); background: var(--glass-b); }
.btn-lg   { padding: 14px 30px; font-size: var(--t-md); border-radius: var(--r-lg); }
.btn-sm   { padding: 7px 14px; font-size: var(--t-xs); border-radius: var(--r-sm, 7px); }
.btn-full { width: 100%; }
.btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

/* ── Inputs ── */
.field { display: flex; flex-direction: column; gap: 6px; }
.label { font-size: var(--t-xs); font-weight: 700; color: var(--text-3); letter-spacing: .07em; text-transform: uppercase; }
.input, .select {
  padding: 11px 15px; border: 1.5px solid var(--border);
  border-radius: var(--r); background: var(--bg-2); color: var(--text);
  font-family: inherit; font-size: var(--t-base); outline: none;
  transition: border-color .15s, box-shadow .15s; width: 100%;
  -webkit-appearance: none;
}
.input:focus, .select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(79,143,255,.18);
}
.input::placeholder { color: var(--text-3); }
textarea.input { resize: vertical; min-height: 90px; }
.select option { background: var(--bg-2); }

/* Hero inputs */
.input-hero {
  padding: 12px 15px; border: 1.5px solid rgba(255,255,255,.1);
  border-radius: var(--r); background: rgba(255,255,255,.06); color: var(--text);
  font-family: inherit; font-size: var(--t-base); font-weight: 500; outline: none;
  transition: all .15s; width: 100%; -webkit-appearance: none;
}
.input-hero::placeholder { color: var(--text-3); }
.input-hero:focus { border-color: var(--blue); background: rgba(255,255,255,.09); box-shadow: 0 0 0 3px rgba(79,143,255,.15); }
.input-hero option { background: var(--bg-2); color: var(--text); }

/* ── Chips / tags ── */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px; font-size: var(--t-xs); font-weight: 700;
}
.chip-blue   { background: var(--blue-gl);  color: var(--blue);  border: 1px solid rgba(79,143,255,.2); }
.chip-green  { background: var(--green-gl); color: var(--green); border: 1px solid rgba(0,230,118,.2); }
.chip-amber  { background: var(--amber-gl); color: var(--amber); border: 1px solid rgba(255,179,0,.2); }
.chip-red    { background: var(--red-gl);   color: var(--red);   border: 1px solid rgba(255,77,106,.2); }
.chip-gray   { background: rgba(255,255,255,.05); color: var(--text-2); border: 1px solid var(--border); }

/* ── Pill toggle ── */
.pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 6px 14px; border-radius: 99px; font-size: var(--t-xs); font-weight: 700;
  cursor: pointer; border: 1.5px solid var(--border); background: var(--glass); color: var(--text-2);
  transition: all .15s; font-family: inherit;
}
.pill:hover { border-color: var(--border-h); color: var(--text); }
.pill.on { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 0 14px rgba(79,143,255,.3); }

/* ── Toggle switch ── */
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  position: absolute; inset: 0; background: var(--bg-3); border-radius: 99px;
  transition: all .2s; cursor: pointer; border: 1px solid var(--border);
}
.toggle-track::before {
  content: ''; position: absolute; width: 16px; height: 16px;
  left: 2px; bottom: 2px; background: var(--text-2); border-radius: 50%; transition: all .2s;
}
.toggle input:checked ~ .toggle-track { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 12px rgba(79,143,255,.3); }
.toggle input:checked ~ .toggle-track::before { transform: translateX(18px); background: #fff; }

/* ── Range slider ── */
input[type=range] {
  width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
  background: var(--bg-3); border-radius: 99px; cursor: pointer; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: var(--blue); border: 3px solid var(--bg-1); cursor: grab;
  box-shadow: 0 0 12px rgba(79,143,255,.4);
}

/* ── Progress ── */
.prog { height: 4px; background: var(--bg-3); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--blue), #8ab4ff); transition: width .5s ease; }

/* ── Header ── */
#header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,12,20,.88); backdrop-filter: blur(24px) saturate(1.5);
  border-bottom: 1px solid var(--border);
}
.hd { height: 56px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 0; cursor: pointer; }
.logo-text {
  font-size: 20px; font-weight: 900; letter-spacing: -.02em;
  background: linear-gradient(135deg, #fff 40%, var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-badge {
  font-size: var(--t-xs); font-weight: 700; color: var(--green); letter-spacing: .05em;
  text-transform: uppercase; margin-left: 8px; background: var(--green-gl);
  padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(0,230,118,.2);
}
.nav { display: flex; align-items: center; gap: 2px; }
.nav-btn {
  padding: 6px 13px; border-radius: var(--r); font-size: var(--t-sm); font-weight: 600;
  color: var(--text-2); background: none; border: none; cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.nav-btn:hover { background: var(--glass-b); color: var(--text); }
.nav-btn.on { background: var(--blue-gl); color: var(--blue); }
.nav-sep { width: 1px; height: 16px; background: var(--border); margin: 0 6px; }

/* ── Hero ── */
.hero { padding: 80px 0 72px; position: relative; overflow: hidden; }
.hero-glow {
  position: absolute; width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(79,143,255,.12) 0%, transparent 70%);
  top: -200px; left: -100px; pointer-events: none;
}
.hero-glow-2 {
  position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,230,118,.08) 0%, transparent 70%);
  bottom: -100px; right: 100px; pointer-events: none;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid var(--border-h); border-radius: 99px;
  padding: 5px 14px 5px 8px; margin-bottom: 24px;
  background: var(--glass);
}
.eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: glow 2s ease-in-out infinite; }
.eyebrow-text { font-size: var(--t-xs); color: var(--text-2); font-weight: 600; }
.hero-h1 {
  font-size: var(--t-hero); font-weight: 900; letter-spacing: -.03em;
  line-height: 1.0; margin-bottom: 22px;
}
.hero-h1 .accent { color: var(--green); }
.hero-h1 .dim { color: var(--text-2); }
.hero-sub { font-size: var(--t-lg); color: var(--text-2); line-height: 1.6; max-width: 500px; margin-bottom: 40px; font-weight: 400; }
.hero-sub strong { color: var(--text); font-weight: 700; }

/* ── Quote engine ── */
.qe {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border-h);
  border-radius: var(--r-2xl); padding: 28px;
  max-width: 680px;
  box-shadow: 0 24px 80px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
}
.qe-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 14px; align-items: flex-end; }
.qe-label { font-size: var(--t-xs); font-weight: 700; color: var(--text-3); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 7px; }
.qe-btn {
  background: var(--blue); color: #fff; border: none; border-radius: var(--r); padding: 12px 22px;
  font-family: inherit; font-weight: 800; font-size: var(--t-sm); cursor: pointer;
  transition: all .18s; white-space: nowrap; display: flex; align-items: center; gap: 8px;
  box-shadow: 0 0 24px rgba(79,143,255,.35); height: 45px; align-self: flex-end;
}
.qe-btn:hover { background: var(--blue-d); transform: translateY(-1px); box-shadow: 0 0 36px rgba(79,143,255,.5); }
.qe-trust { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
.qe-trust-item { font-size: var(--t-xs); color: var(--text-3); display: flex; align-items: center; gap: 5px; }
.qe-trust-item svg { color: var(--green); flex-shrink: 0; }
@media(max-width:640px){ .qe-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width:440px){ .qe-grid { grid-template-columns: 1fr; } }

/* ── Stats ── */
.stats-row { display: flex; gap: 40px; margin-top: 60px; flex-wrap: wrap; }
.stat-n { font-size: clamp(32px,4vw,48px); font-weight: 900; letter-spacing: -.03em; color: var(--text); line-height: 1; }
.stat-n .unit { font-size: .55em; font-weight: 400; color: var(--text-2); vertical-align: top; margin-top: .2em; display: inline-block; }
.stat-l { font-size: var(--t-xs); color: var(--text-3); margin-top: 5px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }

/* ── Compare toolbar ── */
.compare-bar {
  background: rgba(8,12,20,.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 80; padding: 10px 0;
}
.compare-bar-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.result-count { font-size: var(--t-sm); color: var(--text-2); }
.result-count strong { color: var(--text); }
.save-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--green-gl); color: var(--green); border: 1px solid rgba(0,230,118,.2);
  padding: 3px 10px; border-radius: 99px; font-size: var(--t-xs); font-weight: 700;
}
.col-labels {
  display: grid; grid-template-columns: 50px 1fr 145px 155px 145px 170px;
  padding: 0 0 8px; margin-bottom: 4px;
}
.col-label { text-align: center; font-size: var(--t-xs); font-weight: 700; color: var(--text-4); text-transform: uppercase; letter-spacing: .06em; }

/* ── Instructor row ── */
.inst-row {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--r-lg); margin-bottom: 8px; overflow: hidden;
  transition: all .22s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.inst-row:hover { border-color: var(--border-h); background: var(--glass-b); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,.4); }
.inst-row.best { border-color: rgba(0,230,118,.3); box-shadow: 0 0 24px rgba(0,230,118,.06); }
.inst-row.top { border-color: rgba(79,143,255,.3); box-shadow: 0 0 24px rgba(79,143,255,.06); }
.row-inner { display: grid; grid-template-columns: 50px 1fr 145px 155px 145px 170px; align-items: stretch; min-height: 90px; }

.rank-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 4px; border-right: 1px solid var(--border); }
.rank-n { font-size: 18px; font-weight: 900; color: var(--text-4); }
.rank-cell.r1 .rank-n { color: var(--amber); text-shadow: 0 0 12px rgba(255,179,0,.4); }
.rank-cell.r2 .rank-n { color: var(--text-2); }
.rank-cell.r3 .rank-n { color: #a07940; }

.info-cell { padding: 15px 16px; border-right: 1px solid var(--border); display: flex; align-items: center; gap: 13px; }
.avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--border-h); }
.inst-name { font-size: var(--t-md); font-weight: 800; margin-bottom: 3px; letter-spacing: -.01em; }
.inst-meta { font-size: var(--t-xs); color: var(--text-3); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.inst-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
.verified-pill { display: inline-flex; align-items: center; gap: 4px; color: var(--blue); font-size: var(--t-xs); font-weight: 700; }

.metric-cell {
  padding: 15px 14px; text-align: center; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.metric-big { font-size: clamp(20px,2.2vw,27px); font-weight: 900; letter-spacing: -.02em; line-height: 1; margin-bottom: 4px; }
.metric-lbl { font-size: var(--t-xs); color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
.metric-sub { font-size: var(--t-xs); color: var(--text-4); margin-top: 4px; }
.metric-cell.green .metric-big { color: var(--green); }
.metric-cell.blue  .metric-big { color: var(--blue); }
.metric-cell.amber .metric-big { color: var(--amber); }
.metric-cell.red   .metric-big { color: var(--red); }
.metric-cell.muted .metric-big { color: var(--text-2); }

.bench {
  display: inline-flex; align-items: center; padding: 2px 8px; margin-top: 5px;
  border-radius: 5px; font-size: var(--t-xs); font-weight: 700;
}
.bench.below { background: var(--green-gl); color: var(--green); }
.bench.above { background: var(--red-gl); color: var(--red); }
.bench.avg   { background: var(--glass); color: var(--text-3); }

.action-cell { padding: 14px 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.pass-score { font-size: 30px; font-weight: 900; letter-spacing: -.03em; line-height: 1; }
.pass-score-bar { width: 70px; height: 3px; background: var(--bg-3); border-radius: 99px; margin: 4px auto 10px; overflow: hidden; }
.pass-score-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }

/* ── Row banner ── */
.row-banner {
  padding: 5px 18px; font-size: var(--t-xs); font-weight: 800;
  letter-spacing: .08em; text-transform: uppercase;
}
.rb-green { background: linear-gradient(90deg, rgba(0,230,118,.2), transparent); color: var(--green); border-bottom: 1px solid rgba(0,230,118,.15); }
.rb-blue  { background: linear-gradient(90deg, rgba(79,143,255,.2), transparent); color: var(--blue); border-bottom: 1px solid rgba(79,143,255,.15); }

/* ── Expand panel ── */
.expand-panel {
  border-top: 1px solid var(--border); background: rgba(0,0,0,.2);
  padding: 20px 22px;
  display: grid; grid-template-columns: repeat(4,1fr); gap: 20px;
  animation: slideDown .2s ease both;
}
.expand-title { font-size: var(--t-xs); font-weight: 800; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.mini-bars { display: flex; gap: 5px; align-items: flex-end; height: 38px; margin-bottom: 7px; }
.mini-bar { flex: 1; border-radius: 3px 3px 0 0; background: var(--bg-3); min-height: 4px; transition: height .3s; }
.mini-bar.now { background: var(--blue); }
@media(max-width:700px){ .expand-panel { grid-template-columns: 1fr 1fr; } }

/* ── Gate (freemium blur) ── */
.gate-wrap { position: relative; margin-bottom: 8px; }
.gate-blur { filter: blur(4px); pointer-events: none; user-select: none; }
.gate-panel {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 10; text-align: center;
  background: var(--bg-2); border: 1px solid var(--border-h);

// ─── COMPARISON PAGE ────────────────────────────────────────────────────────
const ComparePage = ({insts,sp,isGuest,onNav,onProfile,onBook})=>{
  const [sort,setSort]=useState('passscore');
  const [verOnly,setVerOnly]=useState(false);
  const [maxRate,setMaxRate]=useState(60);
  const [tx,setTx]=useState(sp?.tx||'Any');
  const [gender,setGender]=useState('Any');
  const [ltype,setLtype]=useState(sp?.type||'Any');
  const [evPref,setEvPref]=useState(false);
  const [specs,setSpecs]=useState([]);
  const [expanded,setExpanded]=useState(null);

  const exp=sp?.exp||'Complete Beginner';
  const pc=sp?.postcode||'Manchester';
  const hrs=HOURS[exp]||47;
  const ravg=RAVG(pc);

  const toggleSpec=s=>setSpecs(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);

  const results=useMemo(()=>{
    let r=insts.filter(i=>{
      return (tx==='Any'||i.tx.includes(tx))
        &&(gender==='Any'||i.gender===gender)
        &&(ltype==='Any'||i.types.includes(ltype))
        &&(!verOnly||i.verified)
        &&i.rate<=maxRate
        &&(specs.length===0||specs.every(s=>i.support.includes(s)))
        &&(!evPref||i.car.toLowerCase().includes('ev')||i.car.toLowerCase().includes('tesla')||i.car.toLowerCase().includes('electric')||i.car.toLowerCase().includes('hybrid'));
    }).map(i=>{
      const total=i.rate*hrs;
      const ps=Math.max(0,Math.min(100,100-((i.rate-20)/50)*100));
      const rs=(i.rating/5)*100;
      const passScore=Math.round(ps*.4+rs*.3+i.passRate*.3);
      return {...i,total,passScore};
    });
    switch(sort){
      case 'rate':  return r.sort((a,b)=>a.rate-b.rate);
      case 'total': return r.sort((a,b)=>a.total-b.total);
      case 'pass':  return r.sort((a,b)=>b.passRate-a.passRate);
      case 'rating':return r.sort((a,b)=>b.rating-a.rating);
      default:      return r.sort((a,b)=>b.passScore-a.passScore);
    }
  },[insts,tx,gender,ltype,verOnly,maxRate,specs,sort,hrs,evPref]);

  const maxSave=results.length>1?results[results.length-1].total-results[0].total:0;
  const specOpts=['Anxious Drivers','ADHD Friendly','BSL / Deaf Support','Autism Friendly','Adapted Vehicle'];

  return <>
    <div className="compare-bar">
      <div className="wrap compare-bar-inner">
        <div className="result-count">
          <strong>{results.length}</strong> instructors in {pc}
          {maxSave>0&&<> · <span className="save-pill">{Ic.zap} Save up to £{Math.round(maxSave)}</span></>}
        </div>
        <div className="pill-group">
          {[{v:'passscore',l:'PassScore'},{v:'rate',l:'Cheapest / hr'},{v:'total',l:'Lowest total'},{v:'pass',l:'Pass rate'},{v:'rating',l:'Top rated'}].map(({v,l})=>(
            <button key={v} className={`pill${sort===v?' on':''}`} onClick={()=>setSort(v)}>{l}</button>
          ))}
        </div>
      </div>
    </div>

    <div className="wrap" style={{paddingTop:20,paddingBottom:48}}>
      <div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:20,alignItems:'start'}}>

        <aside className="sidebar">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
            <span style={{fontWeight:800,fontSize:'var(--t-sm)'}}>Filters</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setTx('Any');setGender('Any');setLtype('Any');setVerOnly(false);setMaxRate(60);setSpecs([]);}}>Reset</button>
          </div>
          <div className="filter-block">
            <div className="filter-title">Max hourly rate</div>
            <input type="range" min={20} max={80} value={maxRate} onChange={e=>setMaxRate(+e.target.value)}/>
            <div className="slider-row"><span>£20</span><strong style={{color:'var(--blue)'}}>£{maxRate}</strong></div>
          </div>
          {[
            {t:'Transmission',opts:['Any','Manual','Automatic'],v:tx,set:setTx},
            {t:'Lesson type',opts:['Any','Beginner','Standard','Intensive','Pass Plus','Refresher','Motorbike'],v:ltype,set:setLtype},
            {t:'Instructor gender',opts:['Any','Male','Female'],v:gender,set:setGender},
          ].map(({t,opts,v,set})=>(
            <div key={t} className="filter-block">
              <div className="filter-title">{t}</div>
              <select className="select" value={v} onChange={e=>set(e.target.value)}>{opts.map(o=><option key={o}>{o}</option>)}</select>
            </div>
          ))}
          <div className="filter-block">
            <div className="filter-title">Specialist support</div>
            {specOpts.map(s=>(
              <label key={s} style={{display:'flex',alignItems:'center',gap:8,marginBottom:9,cursor:'pointer',color:'var(--text-2)',fontWeight:400}}>
                <input type="checkbox" style={{width:13,height:13,accentColor:'var(--blue)'}} checked={specs.includes(s)} onChange={()=>toggleSpec(s)}/>
                <span style={{fontSize:'var(--t-xs)'}}>{s}</span>
              </label>
            ))}
          </div>
          <div className="toggle-row">
            <span style={{fontWeight:700,fontSize:'var(--t-sm)'}}>Verified only</span>
            <label className="toggle"><input type="checkbox" checked={verOnly} onChange={e=>setVerOnly(e.target.checked)}/><span className="toggle-track"/></label>
          </div>
          <div className="toggle-row" style={{marginTop:14}}>
            <span style={{fontWeight:700,fontSize:'var(--t-sm)'}}>EV / hybrid vehicle</span>
            <label className="toggle"><input type="checkbox" checked={evPref} onChange={e=>setEvPref(e.target.checked)}/><span className="toggle-track"/></label>
          </div>
        </aside>

        <div>
          {results.length>0&&(
            <div className="col-labels" style={{padding:'0 0 6px',marginBottom:2}}>
              <div/><div/>
              {['Hourly rate','Est. total cost','Pass rate','PassScore'].map(h=>(
                <div key={h} className="col-label">{h}</div>
              ))}
            </div>
          )}

          {results.length===0&&(
            <div className="card card-solid" style={{padding:48,textAlign:'center'}}>
              <div style={{color:'var(--text-3)',marginBottom:14,width:32,height:32,margin:'0 auto 14px'}}>{Ic.search}</div>
              <h3 style={{fontWeight:800,marginBottom:8}}>No results</h3>
              <p style={{color:'var(--text-2)',fontSize:'var(--t-sm)'}}>Try adjusting your filters or raising the max price.</p>
            </div>
          )}

          {results.map((inst,idx)=>{
            const locked=isGuest&&idx>=3;
            const isTop=idx===0;
            const ps=inst.passScore;
            const pc_=ps>=85?'var(--green)':ps>=70?'var(--blue)':ps>=55?'var(--amber)':'var(--red)';
            const priceCls=inst.rate<=ravg-3?'green':inst.rate>=ravg+3?'red':'muted';
            const saving=results.length>1?results[results.length-1].total-inst.total:0;
            const isExp=expanded===inst.id;

            const card=(
              <div
                className={`inst-row${isTop&&sort==='passscore'?' top':''}`}
                style={isTop&&sort==='rate'?{borderColor:'rgba(0,230,118,.3)',boxShadow:'0 0 24px rgba(0,230,118,.06)'}:{}}
                onClick={()=>!locked&&setExpanded(isExp?null:inst.id)}>
                {isTop&&sort==='passscore'&&<div className="row-banner rb-blue">Best PassScore in your area</div>}
                {isTop&&sort==='rate'&&<div className="row-banner rb-green">Cheapest hourly rate</div>}
                {inst.tier==='Premium'&&<div style={{position:'absolute',top:8,right:12,zIndex:2}}><span className="chip chip-blue" style={{fontSize:9,padding:'2px 7px',letterSpacing:'.05em'}}>SPONSORED</span></div>}

                <div className="row-inner">
                  <div className={`rank-cell${idx<3?` r${idx+1}`:''}`}>
                    <span className="rank-n">#{idx+1}</span>
                  </div>
                  <div className="info-cell">
                    <img src={inst.avatar} alt={inst.name} className="avatar"/>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="inst-name">{inst.name}</div>
                      <div className="inst-meta">
                        <Stars r={inst.rating}/>
                        <span style={{fontWeight:700}}>{inst.rating}</span>
                        <span>({inst.reviews})</span>
                        {inst.verified&&<span className="verified-pill">{Ic.shield} Verified</span>}
                      </div>
                      <div className="inst-chips">
                        <span style={{fontSize:'var(--t-xs)',color:'var(--text-3)',display:'flex',alignItems:'center',gap:3}}>{Ic.pin} {inst.area} · {inst.dist.toFixed(1)} mi</span>
                        <span style={{display:'flex',alignItems:'center',gap:4,fontSize:'var(--t-xs)',color:'var(--text-3)'}}><AvailDot s={inst.avail}/>{inst.avail}</span>
                        {saving>80&&<span className="chip chip-green">Save £{Math.round(saving)}</span>}
                      </div>
                    </div>
                  </div>

                  <div className={`metric-cell ${priceCls}`}>
                    <div className="metric-big">£{inst.rate}</div>
                    <div className="metric-lbl">per hour</div>
                    <Bench rate={inst.rate} avg={ravg}/>
                  </div>

                  <div className="metric-cell blue">
                    <div className="metric-big" style={{fontSize:'clamp(15px,1.8vw,20px)'}}>£{inst.total.toLocaleString()}</div>
                    <div className="metric-lbl">est. total</div>
                    <div className="metric-sub">{hrs} hrs × £{inst.rate}</div>
                  </div>

                  <div className={`metric-cell ${inst.passRate>=90?'green':inst.passRate>=80?'muted':'amber'}`}>
                    <div className="metric-big">{inst.passRate}%</div>
                    <div className="metric-lbl">pass rate</div>
                    <div className="metric-sub">UK avg 47%</div>
                  </div>

                  <div className="action-cell">
                    <div style={{textAlign:'center'}}>
                      <div className="pass-score" style={{color:pc_}}>{ps}</div>
                      <div style={{fontSize:'var(--t-xs)',fontWeight:800,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:2}}>PassScore</div>
                      <div className="pass-score-bar"><div className="pass-score-fill" style={{width:`${ps}%`,background:pc_}}/></div>
                    </div>
                    <button className="btn btn-primary btn-sm btn-full" style={{fontSize:11}} onClick={e=>{e.stopPropagation();onBook(inst);}}>Book lesson</button>
                    <button className="btn btn-ghost btn-sm btn-full" style={{fontSize:11}} onClick={e=>{e.stopPropagation();onProfile(inst.id);}}>Full profile</button>
                  </div>
                </div>

                {isExp&&(
                  <div className="expand-panel">
                    <div>
                      <div className="expand-title">Price trend — 4 weeks</div>
                      <div className="mini-bars">
                        {inst.history.map((p,i)=>(
                          <div key={i} className={`mini-bar${i===inst.history.length-1?' now':''}`} style={{height:`${((p-20)/50)*100}%`,minHeight:4}}/>
                        ))}
                      </div>
                      <Trend h={inst.history}/>
                    </div>
                    <div>
                      <div className="expand-title">PassScore breakdown</div>
                      {[
                        {l:'Price competitiveness',v:Math.round(Math.max(0,Math.min(100,100-((inst.rate-20)/50)*100)))},
                        {l:'Rating score',v:Math.round((inst.rating/5)*100)},
                        {l:'Pass rate',v:inst.passRate},
                      ].map(({l,v})=>(
                        <div key={l} style={{marginBottom:8}}>
                          <div style={{display:'flex',justifyContent:'space-between',fontSize:'var(--t-xs)',marginBottom:3}}>
                            <span style={{color:'var(--text-2)'}}>{l}</span><strong>{v}</strong>
                          </div>
                          <div className="prog"><div className="prog-fill" style={{width:`${v}%`}}/></div>

                    <div>
                      <div className="expand-title">Lesson types</div>

                      <div className="expand-title">About</div>
                      <p style={{fontSize:'var(--t-xs)',color:'var(--text-2)',lineHeight:1.65,marginBottom:10}}>{inst.bio}</p>
                      {inst.support.length>0&&<>
                        <div className="expand-title">Support</div>
                        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                          {inst.support.map(s=><span key={s} className="chip chip-green">{s}</span>)}

                  </div>
                )}

            );

            if(locked) return (
              <div key={`gate-${inst.id}`} className="gate-wrap">

                  <div style={{color:'var(--text-3)',marginBottom:10,display:'flex',justifyContent:'center'}}>{Ic.lock}</div>

            return <React.Fragment key={inst.id}>{card}</React.Fragment>;

          {results.length>0&&(
            <div style={{marginTop:20,padding:'12px 16px',background:'var(--bg-1)',border:'1px solid var(--border)',borderRadius:'var(--r)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>

const InstProfile = ({inst:i,exp,postcode,onBack,onBook})=>{
  const hrs=HOURS[exp||'Complete Beginner']||47;

const QuizPage=({quiz,onFinish})=>{
  const [idx,setIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [ans,setAns]=useState(false);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const q=quiz.questions[idx];

  const answer=i=>{if(ans)return;setSel(i);setAns(true);if(i===q.correct)setScore(s=>s+1);};
  const next=()=>{if(idx<quiz.questions.length-1){setIdx(i=>i+1);setSel(null);setAns(false);}else setDone(true);};

  if(!q) return <div className="wrap" style={{paddingTop:40,textAlign:'center'}}>
    <p style={{color:'var(--text-2)'}}>No questions yet for this topic.</p>
    <button className="btn btn-ghost" style={{marginTop:12}} onClick={()=>onFinish(0,0,quiz.topic)}>{Ic.arrowL} Back</button>
  </div>;

  if(done){
    const pct=Math.round(score/quiz.questions.length*100);
    const c=pct>=75?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
    return <div className="wrap" style={{paddingTop:40}}>
      <div className="card-solid" style={{maxWidth:460,margin:'0 auto',padding:48,textAlign:'center',borderRadius:'var(--r-2xl)'}}>
        <h2 style={{fontSize:'var(--t-2xl)',fontWeight:900,letterSpacing:'-.02em',marginBottom:6}}>Quiz complete</h2>
        <div style={{fontSize:64,fontWeight:900,color:c,letterSpacing:'-.03em',margin:'20px 0',lineHeight:1}}>{pct}%</div>
        <p style={{color:'var(--text-2)',fontSize:'var(--t-sm)'}}>{score} of {quiz.questions.length} correct</p>
        <div style={{display:'flex',gap:10,marginTop:28}}>
          <button className="btn btn-ghost btn-full" onClick={()=>onFinish(score,quiz.questions.length,quiz.topic)}>Back to hub</button>
          <button className="btn btn-primary btn-full" onClick={()=>{setIdx(0);setSel(null);setAns(false);setScore(0);setDone(false);}}>{Ic.refresh} Try again</button>
        </div>
      </div>
    </div>;
  }

  return <div className="wrap" style={{paddingTop:28,maxWidth:580,margin:'0 auto'}}>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:'var(--t-xs)',color:'var(--text-3)',marginBottom:8}}>
      <span>Q{idx+1} of {quiz.questions.length}</span><span>{score} correct</span>
    </div>
    <div className="prog" style={{marginBottom:20}}><div className="prog-fill" style={{width:`${(idx/quiz.questions.length)*100}%`}}/></div>
    <div className="card-solid" style={{padding:26,borderRadius:'var(--r-xl)'}}>
      <h2 style={{fontSize:'var(--t-xl)',fontWeight:800,letterSpacing:'-.01em',marginBottom:22,lineHeight:1.3}}>{q.text}</h2>
      {q.opts.map((opt,i)=>{
        let cls='q-opt';
        if(ans&&i===q.correct)cls+=' correct';
        else if(ans&&i===sel)cls+=' wrong';
        return <button key={i} className={cls} onClick={()=>answer(i)} disabled={ans}>
          <span>{opt}</span>
          {ans&&i===q.correct&&<span style={{color:'var(--green)'}}>{Ic.check}</span>}
          {ans&&i===sel&&i!==q.correct&&<span style={{color:'var(--red)'}}>{Ic.x}</span>}
        </button>;
      })}
      {ans&&<div className="callout callout-blue" style={{marginTop:12,color:'var(--text-2)'}}><span style={{color:'var(--blue)',fontWeight:700}}>Explanation: </span>{q.explain}</div>}
      <div style={{textAlign:'right',marginTop:16}}>
        <button className="btn btn-primary" onClick={next} disabled={!ans}>{idx<quiz.questions.length-1?'Next':'Finish'} {Ic.arrowR}</button>
      </div>
    </div>
  </div>;
};

            <div style={{fontSize:'var(--t-xl)',fontWeight:900,color:'var(--blue)',letterSpacing:'-.02em',marginBottom:4}}>{pct}</div>
            <div style={{fontWeight:700,fontSize:'var(--t-sm)',marginBottom:4}}>{l}</div>
            <p style={{fontSize:'var(--t-xs)',color:'var(--text-3)',lineHeight:1.6}}>{d}</p>
          </div>
        ))}
      </div>

      <h2 style={{fontSize:'var(--t-lg)',fontWeight:800,marginBottom:12}}>Sponsored placements</h2>
      <p style={{color:'var(--text-2)',fontSize:'var(--t-sm)',lineHeight:1.7,marginBottom:16}}>Instructors on our <strong style={{color:'var(--text)'}}>Premium</strong> subscription pay £12.99/month. In return, when their PassScore is within 5 points of the next-ranked instructor, they are promoted into positions 1–3. All sponsored results are clearly labelled <span className="chip chip-blue" style={{fontSize:9,padding:'2px 7px',verticalAlign:'middle'}}>SPONSORED</span> on their card.</p>
      <p style={{color:'var(--text-2)',fontSize:'var(--t-sm)',lineHeight:1.7,marginBottom:24}}>Premium placement is limited to 3 instructors per postcode area. If an instructor's PassScore is significantly lower than organic results, they will not be boosted above genuinely better-value options.</p>

      <h2 style={{fontSize:'var(--t-lg)',fontWeight:800,marginBottom:12}}>Pass rates</h2>
      <p style={{color:'var(--text-2)',fontSize:'var(--t-sm)',lineHeight:1.7,marginBottom:24}}>Pass rates are self-reported by instructors. We display them as provided and encourage learners to ask instructors for supporting evidence. We are working towards DVSA data integration for independently verified pass rates.</p>

      <h2 style={{fontSize:'var(--t-lg)',fontWeight:800,marginBottom:12}}>Estimated total cost</h2>
      <p style={{color:'var(--text-2)',fontSize:'var(--t-sm)',lineHeight:1.7,marginBottom:24}}>Total cost estimates use DVSA 2023 survey data for average hours needed by experience level: Complete Beginner (47 hrs), A Few Hours (35 hrs), Some Experience (22 hrs), Returning Driver (12 hrs). Actual hours will vary by individual.</p>

      <div style={{padding:'14px 18px',background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--r)',fontSize:'var(--t-xs)',color:'var(--text-3)',lineHeight:1.7}}>
        PassPal AI is a comparison service. We do not endorse individual instructors and are not responsible for the quality of driving lessons booked through the platform. If you have a complaint about ranking methodology, contact us at ranking@passpal.ai.
      </div>
    </div>
  </div>
);
const App=()=>{
  const [view,setView]=useState('home');
  const [insts,setInsts]=useState(INSTS);
  const [learners,setLearners]=useState(LEARNERS);
  const [selId,setSelId]=useState(null);
  const [sp,setSp]=useState(null);
  const [lu,setLu]=useState(null);
  const [iu,setIu]=useState(null);
  const [admin,setAdmin]=useState(null);
  const [bookInst,setBookInst]=useState(null);
  const [topics,setTopics]=useState(THEORY);
  const [prog,setProg]=useState(PROG);
  const [quiz,setQuiz]=useState(null);
  const [cookie,setCookie]=useState(()=>localStorage.getItem('pp_c'));
  const [lc,setLc]=useState(0);

  const nav=useCallback(v=>{
    window.scrollTo(0,0);
    if(v==='dashboard'&&!lu){setView('learnerLogin');return;}
    setView(v);
  },[lu]);

  const render=()=>{
    if(admin&&view==='adminDashboard') return <AdminDash insts={insts} learners={learners} onApprove={id=>setInsts(p=>p.map(i=>i.id===id?{...i,verified:true}:i))} onLogout={()=>{setAdmin(null);nav('home');}}/>;
    if(view==='adminLogin') return <AdminLogin onLogin={()=>{setAdmin('SuperAdmin');setView('adminDashboard');}}/>;

    switch(view){
      case 'home':     return <Home onNav={nav} onSearch={p=>{setSp(p);setView('compare');}}/>;
      case 'compare':  return <ComparePage insts={insts} sp={sp} isGuest={!lu} onNav={nav} onProfile={id=>{setSelId(id);setView('profile');}} onBook={i=>setBookInst(i)}/>;
      case 'profile':  {const i=insts.find(x=>x.id===selId);return i?<InstProfile inst={i} exp={sp?.exp} postcode={sp?.postcode} onBack={()=>setView('compare')} onBook={i=>setBookInst(i)}/>:<Home onNav={nav} onSearch={p=>{setSp(p);setView('compare');}}/>;}
      case 'theoryPractice':return <TheoryPage topics={topics} mockLeft={prog.mockLeft} onStart={t=>{setQuiz(t==='mock'?{topic:'mock',questions:MOCK_QS.slice(0,10)}:{topic:t,questions:t.questions});setView('quiz');}}/>;
      case 'quiz':     return quiz?<QuizPage quiz={quiz} onFinish={(s,tot,t)=>{if(t!=='mock')setTopics(p=>p.map(x=>x.id===t.id?{...x,progress:Math.max(x.progress,Math.round(s/tot*100))}:x));setProg(p=>({...p,mockLeft:t==='mock'?p.mockLeft-1:p.mockLeft}));setQuiz(null);nav('theoryPractice');}}/>:<TheoryPage topics={topics} mockLeft={prog.mockLeft} onStart={()=>{}}/>;
      case 'dashboard':return lu?<Dashboard progress={prog} onNav={nav}/>:<LearnerLogin onLogin={u=>{setLu(u);nav('home');}} onNav={nav}/>;
      case 'learnerLogin':  return <LearnerLogin onLogin={u=>{setLu(u);nav('home');}} onNav={nav}/>;
      case 'learnerSignup': return <LearnerSignup onSignup={(name,email)=>{const u={...LEARNERS[0],id:99,name,email};setLearners(p=>[...p,u]);setLu(u);nav('compare');}} onNav={nav}/>;
      case 'instructorInfo':return <InstInfoPage onNav={nav}/>;
      case 'instructorLogin':return <InstLogin insts={insts} onLogin={i=>{setIu(i);nav('instructorPortal');}} onNav={nav}/>;
      case 'instructorPortal':return iu?<InstPortal inst={iu} onUpdate={u=>{setInsts(p=>p.map(i=>i.id===u.id?u:i));setIu(u);}} onLogout={()=>{setIu(null);nav('home');}}/>:<InstLogin insts={insts} onLogin={i=>{setIu(i);nav('instructorPortal');}} onNav={nav}/>;
      case 'rankingMethod': return <RankingMethodPage onBack={()=>setView('compare')}/>;
      case 'privacyPolicy': return <PrivacyPage onBack={()=>nav('home')}/>;
      default: return <Home onNav={nav} onSearch={p=>{setSp(p);setView('compare');}}/>;
    }
  };

  const fullscreen=['instructorPortal','adminDashboard'].includes(view)&&(iu||admin);

  return <>
    <Header view={view} onNav={nav} learner={lu} onLogout={()=>{setLu(null);nav('home');}} inst={iu} onInstOut={()=>{setIu(null);nav('home');}} logoClicks={lc} setLC={setLc}/>
    <div className="page-wrap" key={view}>{render()}</div>
    {!fullscreen&&<footer style={{borderTop:'1px solid var(--border)',padding:'18px 24px',textAlign:'center',fontSize:'var(--t-xs)',color:'var(--text-4)',marginTop:56,background:'var(--bg-1)'}}>
      <div className="wrap" style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <span>© {new Date().getFullYear()} PassPal AI Ltd.</span>
        <div style={{display:'flex',gap:16}}>
          <button onClick={()=>nav('privacyPolicy')} style={{background:'none',border:'none',color:'var(--blue)',cursor:'pointer',fontSize:'var(--t-xs)'}}>Privacy & Cookies</button>
          <span>Ranking methodology disclosed below each result set.</span>
        </div>
      </div>
    </footer>}
    {bookInst&&<BookModal inst={bookInst} onClose={()=>setBookInst(null)}/>}
    {!cookie&&<div className="cookie">
      <p className="cookie-text">We use cookies to improve your experience. <button onClick={()=>nav('privacyPolicy')} style={{background:'none',border:'none',color:'var(--blue)',cursor:'pointer',fontSize:'inherit',textDecoration:'underline'}}>Privacy policy</button></p>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>{setCookie('d');localStorage.setItem('pp_c','d');}}>Decline</button>
        <button className="btn btn-primary btn-sm" onClick={()=>{setCookie('a');localStorage.setItem('pp_c','a');}}>Accept</button>
      </div>
    </div>}
  </>;
};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
